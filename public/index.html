<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>مصنّف الذاكرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CSS — PWA Mobile-First Design
   ═══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;
  --accent:#00d4ff;--accent2:#ff6b35;
  --glass:rgba(255,255,255,0.04);--text:#e8e8f0;--muted:#6b6b8a;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* ─── LED Bar ─── */
.led-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px 4px;background:var(--card)}
.led{width:8px;height:8px;border-radius:50%;background:#2a2a3a;transition:all .3s ease;flex-shrink:0}
.led.active{box-shadow:0 0 6px 2px currentColor}
.led.scanning{animation:ledPulse .6s ease-in-out infinite}
@keyframes ledPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ─── Status Bar ─── */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:var(--card);border-bottom:1px solid var(--border);font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#666;margin-left:6px;display:inline-block}

/* ─── Camera ─── */
.camera-wrap{position:relative;width:100%;background:#000;aspect-ratio:4/3;overflow:hidden}
.camera-wrap video{width:100%;height:100%;object-fit:cover}
.focus-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:25%;aspect-ratio:1.2;border:2px solid var(--accent);border-radius:8px;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,0.35)}
.focus-box::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border:1px solid rgba(0,212,255,0.3);border-radius:8px}
.scan-line{position:absolute;top:0;left:15%;width:70%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;pointer-events:none}
.scan-line.active{opacity:1;animation:scanMove 1.5s ease-in-out infinite}
@keyframes scanMove{0%{top:30%}100%{top:70%}}

/* ─── Quality Indicators ─── */
.quality-bar{display:flex;justify-content:center;gap:16px;padding:6px;background:var(--card);font-size:11px;color:var(--muted)}
.q-item{display:flex;align-items:center;gap:4px}
.q-dot{width:6px;height:6px;border-radius:50%;background:#666}
.q-dot.good{background:#00e676;box-shadow:0 0 4px #00e676}
.q-dot.warn{background:#ffab00;box-shadow:0 0 4px #ffab00}
.q-dot.bad{background:#ff1744;box-shadow:0 0 4px #ff1744}

/* ─── Auto Progress ─── */
.auto-progress{height:3px;background:var(--border)}
.auto-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00e676);width:0;transition:width .3s}

/* ─── Controls ─── */
.controls{display:flex;gap:8px;padding:10px 16px;background:var(--card);justify-content:center;flex-wrap:wrap}
.btn{border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;padding:10px 18px;font-size:13px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:#fff}
.btn-secondary{background:var(--glass);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:linear-gradient(135deg,#ff6b35,#ff3366);color:#fff}
.btn:active{transform:scale(0.95)}

/* ─── Manual Input ─── */
.manual-row{display:flex;gap:8px;padding:8px 16px;background:var(--card)}
.manual-row input{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;padding:8px 12px;font-size:14px;direction:ltr;text-align:left}
.manual-row input::placeholder{color:var(--muted)}

/* ─── Result Card ─── */
.result-card{display:none;margin:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.result-card.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-code{font-size:16px;font-weight:700;color:var(--accent);direction:ltr;margin-bottom:8px;word-break:break-all}
.result-time{font-size:11px;color:var(--muted);margin-bottom:12px}
.type-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:700}
.type-badge.normal{background:rgba(255,255,255,0.08);color:#e0e0e0}
.type-badge.glass{background:rgba(0,150,255,0.15);color:#4fc3f7}
.storage-num{font-size:48px;font-weight:900;color:#fff;line-height:1}
.storage-unit{font-size:14px;color:var(--muted)}
.info-chip{display:inline-block;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:12px;margin-top:8px}

/* ─── Confirm/Correct Actions ─── */
.confirm-actions{display:none;gap:8px;padding:8px 16px;justify-content:center}
.correction-form{display:none;padding:10px 16px;background:var(--card);border-top:1px solid var(--border)}
.correction-form select,.correction-form input{background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;padding:8px;font-size:13px;width:100%;margin-bottom:8px}

/* ─── Loading ─── */
.loading-card{display:none;margin:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.loading-card.show{display:block}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-steps{text-align:right;font-size:12px;color:var(--muted)}
.loading-steps .step{padding:2px 0;transition:color .3s}
.loading-steps .step.active{color:var(--accent)}
.loading-steps .step.done{color:#00e676}

/* ─── Error ─── */
.error-card{display:none;margin:10px 16px;background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.2);border-radius:12px;padding:12px;text-align:center;color:#ff6b6b;font-size:13px}
.error-card.show{display:block}

/* ─── Chat ─── */
.chat-section{padding:10px 16px}
.chat-msgs{max-height:200px;overflow-y:auto;margin-bottom:8px}
.chat-msg{padding:6px 10px;margin-bottom:4px;border-radius:10px;font-size:13px;line-height:1.6;direction:rtl}
.chat-msg.bot{background:var(--glass);border:1px solid var(--border)}
.chat-msg.user{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);text-align:right}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;padding:8px 12px;font-size:13px}
.chat-input-row button{background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Cairo',sans-serif;font-weight:700;padding:8px 14px;cursor:pointer;font-size:13px}

/* ─── Stats ─── */
.stats-bar{display:flex;justify-content:space-around;padding:8px 16px;background:var(--card);border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.stat-item{text-align:center}
.stat-num{font-size:16px;font-weight:700;color:var(--text)}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<!-- ═══ LED Bar ═══ -->
<div class="led-bar" id="ledBar">
  <div class="led" id="led-vision" style="color:#00e676" title="Vision OCR"></div>
  <div class="led" id="led-db" style="color:#2196f3" title="DB Search"></div>
  <div class="led" id="led-gemini" style="color:#ff9800" title="Gemini AI"></div>
  <div class="led" id="led-rag" style="color:#e040fb" title="RAG Selector"></div>
  <div class="led" id="led-fuzzy" style="color:#ffeb3b" title="Fuzzy Match"></div>
  <div class="led" id="led-cache" style="color:#00bcd4" title="Cache"></div>
  <div class="led" id="led-pattern" style="color:#8bc34a" title="Pattern"></div>
  <div class="led" id="led-correction" style="color:#ff5722" title="Correction"></div>
  <div class="led" id="led-failed" style="color:#f44336" title="Failed"></div>
</div>

<!-- ═══ Status Bar ═══ -->
<div class="status-bar">
  <div><span id="statusDot" class="status-dot"></span><span id="statusText">جاهز</span></div>
  <div>📊 <span id="sessionCount">0</span></div>
</div>

<!-- ═══ Camera ═══ -->
<div class="camera-wrap" id="cameraWrapper" onclick="tapCapture()">
  <video id="video" autoplay playsinline muted></video>
  <div class="focus-box"></div>
  <div class="scan-line" id="scanLine"></div>
</div>

<!-- ═══ Quality Indicators ═══ -->
<div class="quality-bar">
  <div class="q-item"><span class="q-dot" id="qSharp"></span> حدة</div>
  <div class="q-item"><span class="q-dot" id="qStable"></span> ثبات</div>
  <div class="q-item"><span class="q-dot" id="qLight"></span> إضاءة</div>
</div>

<!-- ═══ Auto Progress ═══ -->
<div class="auto-progress"><div class="auto-progress-fill" id="autoProgressFill"></div></div>
<div style="text-align:center;font-size:11px;color:var(--muted);padding:2px" id="autoMsg"></div>

<!-- ═══ Controls ═══ -->
<div class="controls">
  <button class="btn btn-primary" onclick="tapCapture()">📸 صوّر</button>
  <button class="btn btn-secondary" id="flashBtn" onclick="toggleFlash()">🔦 فلاش</button>
  <button class="btn btn-secondary" onclick="toggleCamera()">📷 كاميرا</button>
  <label class="btn btn-secondary" style="margin:0">
    📁 ملف
    <input type="file" accept="image/*" onchange="handleFileUpload(event)" style="display:none">
  </label>
</div>

<!-- ═══ Manual Code Input ═══ -->
<div class="manual-row">
  <input type="text" id="manualCode" placeholder="اكتب الكود يدوي..." autocomplete="off">
  <button class="btn btn-primary" onclick="searchManual()">🔍</button>
</div>

<!-- ═══ Loading Card ═══ -->
<div class="loading-card" id="loadingCard">
  <div class="loading-spinner"></div>
  <div class="loading-steps">
    <div class="step" id="step1">🔤 قراءة الكود...</div>
    <div class="step" id="step2">📊 بحث في الجداول...</div>
    <div class="step" id="step3">🤖 تحليل Gemini...</div>
  </div>
</div>

<!-- ═══ Error Card ═══ -->
<div class="error-card" id="errorCard"></div>

<!-- ═══ Result Card ═══ -->
<div class="result-card" id="resultCard">
  <div class="result-code" id="detectedCode"></div>
  <div class="result-time" id="resultTime"></div>
  <div id="typeBadge"></div>
  <div class="storage-num" id="storageNum"></div>
  <div class="storage-unit">GB</div>
  <div id="ramBga"></div>
</div>

<!-- ═══ Confirm/Correct ═══ -->
<div class="confirm-actions" id="confirmActions">
  <button class="btn btn-primary" onclick="confirmResult()">✅ صح</button>
  <button class="btn btn-danger" onclick="showCorrectionForm()">❌ غلط</button>
</div>

<div class="correction-form" id="correctionForm">
  <select id="correctStorage">
    <option value="">-- المساحة الصح --</option>
    <option>8</option><option>16</option><option>32</option><option>64</option>
    <option>128</option><option>256</option><option>512</option>
  </select>
  <select id="correctType">
    <option value="عادي">⚪ عادي</option>
    <option value="زجاجي">🔵 زجاجي</option>
  </select>
  <input type="text" id="correctRam" placeholder="الرام (اختياري)">
  <button class="btn btn-primary" onclick="submitCorrection()" style="width:100%">💾 حفظ التصحيح</button>
</div>

<!-- ═══ Chat ═══ -->
<div class="chat-section">
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="اسأل عن كود أو علّمني..." onkeypress="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">إرسال</button>
  </div>
</div>

<!-- ═══ Training Section ═══ -->
<div style="padding:10px 16px">
  <button class="btn btn-secondary" onclick="toggleTraining()" style="width:100%">🎓 صور التدريب (<span id="trainCount">0</span>)</button>
</div>
<div id="trainingPanel" style="display:none;padding:10px 16px;background:var(--card);border-top:1px solid var(--border)">
  <p style="font-size:12px;color:var(--muted);margin-bottom:8px">ارفع صور أمثلة عشان جيمناي يتعلم يفكك أحسن (مرة واحدة كل جلسة)</p>
  <div id="trainList" style="margin-bottom:8px"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <input type="text" id="trainLabel" placeholder="وصف الصورة (مثلا: زجاجي Samsung)" style="flex:1;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;padding:8px;font-size:13px;min-width:150px">
    <label class="btn btn-primary" style="margin:0;cursor:pointer">
      📷 ارفع صورة
      <input type="file" accept="image/*" onchange="uploadTraining(event)" style="display:none">
    </label>
    <button class="btn btn-danger" onclick="clearTraining()">🗑️ مسح الكل</button>
  </div>
</div>

<!-- ═══ Stats ═══ -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="statTotal">0</div>إجمالي</div>
  <div class="stat-item"><div class="stat-num" id="statSuccess">0</div>نجاح</div>
  <div class="stat-item"><div class="stat-num" id="statCache">-</div>كاش</div>
</div>

// ─── Camera System (exact same settings) ───
async function findBestCamera() {
  if (bestCameraId) return bestCameraId;
  try {
    var temp = await navigator.mediaDevices.getUserMedia({ video: true });
    temp.getTracks().forEach(function(t){ t.stop(); });
    var devices = await navigator.mediaDevices.enumerateDevices();
    var cams = devices.filter(function(d){ return d.kind === 'videoinput'; });
    if (cams.length <= 1) return null;
    var best = null, bestRes = 0;
    for (var i = 0; i < cams.length; i++) {
      try {
        var ts = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cams[i].deviceId } } });
        var track = ts.getVideoTracks()[0];
        var caps = track.getCapabilities ? track.getCapabilities() : {};
        var maxW = (caps.width && caps.width.max) ? caps.width.max : 0;
        if (maxW > bestRes) { bestRes = maxW; best = cams[i].deviceId; }
        ts.getTracks().forEach(function(t){ t.stop(); });
      } catch(e) {}
    }
    if (best) { bestCameraId = best; console.log('Best camera: ' + bestRes + 'px'); }
    return best;
  } catch(e) { return null; }
}

async function startCamera() {
  if (stream) { try { stream.getTracks().forEach(function(t){t.stop();}); } catch(x){} stream = null; }
  imageCapture = null;
  var camId = await findBestCamera();
  // Attempt 1: exact deviceId + 4K
  if (camId) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId:{exact:camId}, width:{ideal:3840}, height:{ideal:2160}, focusMode:'continuous' }, audio: false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 2: facingMode environment + 4K
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode:{exact:'environment'}, width:{ideal:3840}, height:{ideal:2160}, focusMode:'continuous' }, audio: false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 3: facingMode environment + 1080p
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }, audio: false
      });
    } catch(e) { stream = null; }
  }
  if (!stream) { addChatMsg('المساعد','لا يمكن فتح الكاميرا. استخدم زر "ملف" لاختيار صورة.','bot'); return false; }
  var video = document.getElementById('video');
  if (video) {
    video.srcObject = stream;
    video.muted = true;
    await new Promise(function(resolve) {
      video.onloadedmetadata = function() { video.play().then(resolve).catch(resolve); };
      setTimeout(resolve, 3000);
    });
  }
  // ImageCapture
  try {
    if ('ImageCapture' in window) {
      var track = stream.getVideoTracks()[0];
      var ic = new ImageCapture(track);
      await ic.grabFrame();
      imageCapture = ic;
    }
  } catch(e) { imageCapture = null; }
  try {
    var s = stream.getVideoTracks()[0].getSettings();
    console.log('Camera: ' + s.width + 'x' + s.height);
  } catch(e) {}
  cameraActive = true;
  startQualityMonitor();
  return true;
}

function stopCamera() {
  stopAutoAnalysis();
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
  imageCapture = null;
  cameraActive = false;
}

// ─── Quality Monitoring ───
function startQualityMonitor() {
  if (autoInterval) clearInterval(autoInterval);
  autoProgress = 0; prevFrame = null;
  updateAutoUI(0, 'وجّه الكاميرا على شريحة الذاكرة');
  autoInterval = setInterval(analyzeFrame, 800);
}
function startAutoAnalysis() { startQualityMonitor(); }
function stopAutoAnalysis() {
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  autoProgress = 0; prevFrame = null; updateAutoUI(0, '');
}

function analyzeFrame() {
  if (!stream || isAnalyzing) return;
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas || video.videoWidth === 0) return;
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  var cx = Math.floor(canvas.width*0.25), cy = Math.floor(canvas.height*0.25);
  var cw = Math.floor(canvas.width*0.5), ch = Math.floor(canvas.height*0.5);
  var imgData = ctx.getImageData(cx, cy, cw, ch);
  var data = imgData.data;
  // Sharpness (Laplacian)
  var sharp = 0;
  for (var y=1; y<ch-1; y+=4) {
    for (var x=1; x<cw-1; x+=4) {
      var idx=(y*cw+x)*4;
      var center=data[idx], top=data[((y-1)*cw+x)*4]||0, bottom=data[((y+1)*cw+x)*4]||0;
      var left=data[(y*cw+(x-1))*4]||0, right=data[(y*cw+(x+1))*4]||0;
      sharp += Math.abs(4*center - top - bottom - left - right);
    }
  }
  sharp = Math.min(sharp/1000, 100);
  // Stability
  var stability = 50;
  if (prevFrame && prevFrame.length === data.length) {
    var diff=0;
    for (var i=0; i<data.length; i+=16) diff += Math.abs(data[i]-prevFrame[i]);
    diff /= (data.length/16);
    stability = Math.max(0, 100 - diff*2);
  }
  prevFrame = new Uint8ClampedArray(data);
  // Brightness
  var brightness=0;
  for (var i=0; i<data.length; i+=4) brightness += (data[i]+data[i+1]+data[i+2])/3;
  brightness /= (data.length/4);
  var qSharp = sharp>15?'good':sharp>8?'warn':'bad';
  var qStable = stability>70?'good':stability>40?'warn':'bad';
  var qLight = (brightness>60&&brightness<220)?'good':brightness>30?'warn':'bad';
  document.getElementById('qSharp').className = 'q-dot '+qSharp;
  document.getElementById('qStable').className = 'q-dot '+qStable;
  document.getElementById('qLight').className = 'q-dot '+qLight;
  var allGood = qSharp==='good' && qStable==='good' && qLight==='good';
  if (allGood) autoProgress = Math.min(100, autoProgress+3);
  else autoProgress = Math.max(0, autoProgress-5);
  var msg = 'وجّه الكاميرا';
  if (qLight==='bad') msg='الإضاءة ضعيفة';
  else if (qSharp==='bad') msg='قرّب أكتر';
  else if (qStable==='bad') msg='ثبّت إيدك';
  else if (allGood && autoProgress<100) msg='ممتاز! ثبّت... '+autoProgress+'%';
  else if (allGood) msg='جاهز! اضغط صوّر';
  updateAutoUI(autoProgress, msg);
}
function updateAutoUI(progress, msg) {
  var fill = document.getElementById('autoProgressFill');
  if (fill) fill.style.width = progress+'%';
  var el = document.getElementById('autoMsg');

// ─── Capture ───
function tapCapture() {
  if (!stream || !cameraActive || isAnalyzing) return;
  stopAutoAnalysis();
  var video = document.getElementById('video');
  if (video && video.srcObject) video.srcObject.getTracks().forEach(function(t){ t.enabled=false; });
  var wrapper = document.getElementById('cameraWrapper');
  if (wrapper) { wrapper.style.opacity='0.3'; setTimeout(function(){wrapper.style.opacity='1';},150); }
  captureAndAnalyze();
}

function cropToFocusBox(sourceCanvas, videoW, videoH) {
  var boxW = videoW * 0.25;
  var boxH = boxW / 1.2;
  var boxX = (videoW - boxW) / 2;
  var boxY = (videoH - boxH) / 2;
  var cropCanvas = document.createElement('canvas');
  cropCanvas.width = boxW; cropCanvas.height = boxH;
  cropCanvas.getContext('2d').drawImage(sourceCanvas, boxX, boxY, boxW, boxH, 0, 0, boxW, boxH);
  return cropCanvas;
}

async function captureAndAnalyze() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas) return;
  var ctx = canvas.getContext('2d');
  var w = video.videoWidth || 1280, h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  // ImageCapture path (full res)
  if (imageCapture) {
    try {
      var blob = await imageCapture.takePhoto();
      var img = new Image();
      img.onload = function() {
        canvas.width = img.width; canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        var cropped = cropToFocusBox(canvas, img.width, img.height);
        var base64 = cropped.toDataURL('image/jpeg', 1.0);
        analyzeImage(base64.split(',')[1], base64);
      };
      img.src = URL.createObjectURL(blob);
      return;
    } catch(e) { console.log('ImageCapture fallback to Canvas'); }
  }
  // Canvas fallback
  ctx.drawImage(video, 0, 0, w, h);
  var cropped = cropToFocusBox(canvas, w, h);
  var base64 = cropped.toDataURL('image/jpeg', 1.0);
  analyzeImage(base64.split(',')[1], base64);
}

function unfreezeCamera() {
  var video = document.getElementById('video');
  if (video && video.srcObject) video.srcObject.getTracks().forEach(function(t){ t.enabled=true; });
}

// ─── Local DB Search (frontend fast-path) ───
function searchInDB(code) {
  if (!code) return null;
  var u = code.toUpperCase().trim();
  // NORMAL_DB
  for (var cap in NORMAL_DB) {
    var codes = NORMAL_DB[cap];
    for (var i=0; i<codes.length; i++) {
      if (u === codes[i].toUpperCase() || u.startsWith(codes[i].toUpperCase().split('-')[0])) {
        var parts = cap.split('+');
        return { storage: parts[0], type: 'عادي', ram: parts[1] ? parts[1].replace(/D[0-9]|正码|杂码|UMCP/g,'').trim() : null };
      }
    }
  }
  // EMMC_DB
  for (var size in EMMC_DB) {
    var codes = EMMC_DB[size];
    for (var i=0; i<codes.length; i++) {
      if (u === codes[i].toUpperCase() || u.startsWith(codes[i].toUpperCase().split('-')[0])) return { storage: size, type: 'زجاجي' };
    }
  }
  // MICRON_DB
  for (var size in MICRON_DB) {
    var codes = MICRON_DB[size];
    for (var i=0; i<codes.length; i++) {
      if (u === codes[i].toUpperCase()) return { storage: size, type: 'زجاجي' };
    }
  }
  // Shortcuts
  var sMap = {'N':'8','E':'16','X':'32','D':'32','C':'64','H':'64','P':'64','G':'128','V':'128','F':'256','S':'256'};
  if (u.startsWith('KM') && !u.startsWith('KLM') && !u.startsWith('KLU')) {
    var m = u.match(/([NEXDCHPGVFS])(000|100|200|600|700|800|900)/);
    if (m && sMap[m[1]]) return { storage: sMap[m[1]], type: 'عادي', fromShortcut: true };
  }
  if (u.startsWith('KLM') || u.startsWith('KLU')) {
    var eMap = {'AG':'16','BG':'32','CG':'64','DG':'128','EG':'256','FG':'512'};
    for (var k in eMap) { if (u.includes(k)) return { storage: eMap[k], type: 'زجاجي', fromShortcut: true }; }
  }
  if (u.startsWith('H9')) {
    var hMap = {'17':'16','18':'16','19':'16','26':'32','27':'32','52':'64','53':'64','16':'128'};
    var num = u.substring(4,6);
    if (hMap[num]) return { storage: hMap[num], type: 'عادي', fromShortcut: true };
  }
  if (u.startsWith('THG')) {
    var tMap = {'G7':'16','G8':'32','G9':'64','T0':'128','T1':'256','T2':'512'};
    var key = u.substring(6,8);
    if (tMap[key]) return { storage: tMap[key], type: 'زجاجي', fromShortcut: true };
  }
  if (u.startsWith('SDIN') || u.startsWith('SDAD')) {
    var m = u.match(/(\d+)G/);
    if (m) return { storage: m[1], type: 'زجاجي', fromShortcut: true };
  }
  if (u.startsWith('YMEC') && u.length>=5) {
    var yMap = {'6':'32','G':'32','7':'64','8':'128','B':'128','9':'256'};
    if (yMap[u[4]]) return { storage: yMap[u[4]], type: 'زجاجي', fromShortcut: true };
  }
  // General
  var gm = u.match(/([NEXDCHPGVFS])(000|100|200|600|700|800|900|6001|7001|8001|9001)/i);
  if (gm && sMap[gm[1].toUpperCase()]) return { storage: sMap[gm[1].toUpperCase()], type: 'عادي', fromShortcut: true };
  return null;
}

function isValidCode(code) {
  if (!code || code.length < 3) return false;
  var u = code.toUpperCase().trim();
  if (/^(KM|KL[MU]|H9|H2[68]|HN|THG|SDI|SDA|J[WZ]|YMEC|TY|08EM|16E[MN]|PA)/.test(u)) return true;
  if (/^[0-9]{6,}$/.test(u)) return true;
  if (u.length >= 8 && /[A-Z]/.test(u) && /[0-9]/.test(u)) return true;
  return false;
}
function detectCompanyLocal(code) {
  if (!code) return '';
  var u = code.toUpperCase();
  if (/^KM|^KLM|^KLU/.test(u)) return 'Samsung';
  if (/^H9|^H2[6-8]|^HN/.test(u)) return 'SK Hynix';
  if (/^THG/.test(u)) return 'Toshiba';
  if (/^SDI|^SDA/.test(u)) return 'SanDisk';
  if (/^J[WZ]/.test(u)) return 'Micron';
  if (/^TY|^YMEC/.test(u)) return 'YMEC';
  if (/^(08|16)EM/.test(u)) return 'UNIC';
  return '';
}
function ocrCleanup(text) {
  if (!text) return '';
  return text.toUpperCase().replace(/[^A-Z0-9\-]/g, '');
}
function extractSamsungRam(code) {
  if (!code) return null;
  var mainPart = code.split('-')[0];
  if (mainPart.length < 3) return null;
  var ch = mainPart[mainPart.length-2].toUpperCase();
  return SAMSUNG_RAM_MAP[ch] || null;
}

// ─── Analyze Image (Hybrid Racing) ───
async function analyzeImage(base64, previewSrc) {
  if (isAnalyzing) return;
  isAnalyzing = true; lastBase64 = base64;
  resetLEDs(); startLEDAnimation(); startScanBar();
  showLoading(true); showResult(false); showError(false);
  document.getElementById('confirmActions').style.display = 'none';
  document.getElementById('correctionForm').style.display = 'none';

  var raceWon = false, startTime = Date.now(), fastResult = null, geminiResult = null;
  var abortOCR = new AbortController(), abortGemini = new AbortController();

  function submitWinner(parsed, source) {
    if (raceWon) return false;
    raceWon = true;
    var elapsed = ((Date.now()-startTime)/1000).toFixed(1);
    var conf = parsed.confidence || 0;
    try { abortOCR.abort(); } catch(e) {}
    try { abortGemini.abort(); } catch(e) {}
    stopLEDAnimation();
    if (parsed.step) lightLED(parsed.step);
    lastParsed = parsed; currentCode = parsed.code || '';
    var manualInput = document.getElementById('manualCode');
    if (manualInput) manualInput.value = currentCode;
    if (parsed.storage && parsed.type) {
      stopScanBar(true); showLoading(false); successCount++;
      displayResult(currentCode, { storage:parsed.storage, type:parsed.type, ram:parsed.ram||null }, parsed.company||'');
      document.getElementById('confirmActions').style.display = 'flex';
      sessionCount++; document.getElementById('sessionCount').textContent = sessionCount;
      document.getElementById('statTotal').textContent = sessionCount;
      document.getElementById('statSuccess').textContent = successCount;
      var dot = document.getElementById('statusDot');
      var confColor = conf>=90?'#00e676':conf>=70?'#00ff88':'#ffab00';
      if (dot) { dot.style.background=confColor; dot.style.boxShadow='0 0 10px '+confColor; }
      document.getElementById('statusText').textContent = source+' ('+elapsed+'s) ['+conf+'%]';
      addChatMsg('المساعد', currentCode+' - '+parsed.storage+'GB '+parsed.type+(parsed.suggestion?' ('+parsed.suggestion+')':'')+' ['+source+' '+elapsed+'s '+conf+'%]','bot');
    } else {
      stopScanBar(false); showLoading(false);
      displayResult(currentCode, null, parsed.company||'');
      document.getElementById('correctionForm').style.display = 'block';
      sessionCount++; document.getElementById('sessionCount').textContent = sessionCount;
      document.getElementById('statTotal').textContent = sessionCount;
      addChatMsg('المساعد','كود جديد: '+currentCode+' - اكتب المساحة والنوع','bot');
    }
    isAnalyzing = false; unfreezeCamera();
    if (stream && cameraActive) setTimeout(startAutoAnalysis, 2000);
    return true;
  }

  // Path 1: Vision OCR → DB Lookup (FAST)
  var ocrPromise = (async function() {
    try {
      var vRes = await fetch('/api/vision-ocr', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({imageBase64:base64}), signal:abortOCR.signal });
      if (raceWon) return null;
      if (!vRes.ok) return null;
      var vData = await vRes.json();
      if (raceWon) return null;
      var ocrText = (vData.text||'').trim();
      if (!ocrText || ocrText.length<3) return null;
      var lines = ocrText.split(/[\n\r\s]+/).filter(function(l){return l.length>=3;});
      lines.unshift(ocrText);
      for (var li=0; li<lines.length; li++) {
        if (raceWon) return null;
        var line = ocrCleanup(lines[li]);
        if (line.length<4) continue;
        var localResult = searchInDB(line);
        if (localResult && localResult.storage && localResult.type) {
          var result = { code:line, storage:localResult.storage, type:localResult.type, company:detectCompanyLocal(line), ram:localResult.ram||null, step:'vision_db', confidence:93 };
          fastResult = result;
          submitWinner(result, 'FAST');
          return result;
        }
      }
      // Server lookup fallback
      if (!raceWon && ocrText.length>=4) {
        var lRes = await fetch('/api/lookup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:ocrText,learnedCodes:cloudLearned,source:'vision'}), signal:abortOCR.signal });
        if (!raceWon && lRes.ok) {
          var lData = await lRes.json();
          if (lData.found && lData.storage && lData.type) {
            var r2 = { code:lData.code||ocrText, storage:lData.storage, type:lData.type, company:lData.company||'', ram:lData.ram||null, step:'vision_lookup', confidence:91 };
            fastResult = r2; submitWinner(r2, 'FAST'); return r2;
          }
        }
      }
      return null;
    } catch(e) { return null; }
  })();

  // Path 2: Gemini Vision (background verification)
  var geminiPromise = (async function() {
    try {
      var gRes = await fetch('/api/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({imageBase64:base64,learnedCodes:cloudLearned}), signal:abortGemini.signal });
      if (raceWon && fastResult) return null;
      if (!gRes.ok) { var err={}; try{err=await gRes.json();}catch(e){} return {error:true,data:err}; }
      var parsed = await gRes.json();
      if (!parsed.confidence) parsed.confidence = (parsed.storage&&parsed.type)?70:30;
      if (parsed.code && isValidCode(parsed.code)) {
        geminiResult = parsed;
        if (!raceWon && parsed.storage && parsed.type) { submitWinner(parsed,'Gemini'); return parsed; }
        if (raceWon && fastResult && parsed.storage && parsed.type && parsed.code !== fastResult.code) {
          addChatMsg('المساعد','Gemini صحح: '+parsed.code+' - '+parsed.storage+'GB '+parsed.type+' (كان '+fastResult.code+')','bot');
          lastParsed = parsed; currentCode = parsed.code;
          document.getElementById('manualCode').value = parsed.code;
          displayResult(parsed.code,{storage:parsed.storage,type:parsed.type,ram:parsed.ram||null},parsed.company);
        }
      }
      return parsed;
    } catch(e) { return {error:true,data:{error:e.message}}; }
  })();

  // Wait for both
  try {
    await Promise.allSettled([ocrPromise, geminiPromise]);
    if (!raceWon) {
      if (geminiResult && !geminiResult.error && geminiResult.code && geminiResult.storage && geminiResult.type) {
        submitWinner(geminiResult, 'Gemini');
      } else if (geminiResult && geminiResult.error) {
        stopLEDAnimation(); lightLED('failed'); stopScanBar(false); showLoading(false);
        showError((geminiResult.data&&geminiResult.data.error)||'فشل التحليل');
        isAnalyzing=false; unfreezeCamera();
      } else {
        stopLEDAnimation(); lightLED('failed'); stopScanBar(false); showLoading(false);
        showError('مش شايف كود ذاكرة - صوّر أقرب');
        addChatMsg('المساعد','مش شايف كود ذاكرة - صوّر أقرب على الشريحة أو اكتب الكود يدوي','bot');
        isAnalyzing=false; unfreezeCamera();
      }
      if (stream && cameraActive) setTimeout(startAutoAnalysis, 2000);
    }
  } catch(e) {
    if (!raceWon) { stopLEDAnimation(); showLoading(false); showError('خطأ في الاتصال'); isAnalyzing=false; unfreezeCamera(); }
  }
}

function searchManual() {
