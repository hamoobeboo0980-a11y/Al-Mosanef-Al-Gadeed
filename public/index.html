<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<title>مصنّف الذاكرة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;direction:rtl}
.app{max-width:480px;margin:0 auto;padding:12px}
h1{text-align:center;font-size:20px;padding:10px 0;color:#58a6ff}

/* Camera */
.cam-box{position:relative;width:100%;aspect-ratio:4/3;background:#161b22;border-radius:12px;overflow:hidden;margin-bottom:10px}
.cam-box video{width:100%;height:100%;object-fit:cover}
.focus-rect{position:absolute;top:50%;left:50%;width:25%;aspect-ratio:1/1.2;transform:translate(-50%,-50%);border:2px solid #58a6ff;border-radius:6px;pointer-events:none}
.quality-bar{display:flex;gap:8px;justify-content:center;padding:4px;font-size:12px;color:#8b949e}
.q-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px;background:#555}
.q-dot.good{background:#2ea043}.q-dot.warn{background:#d29922}.q-dot.bad{background:#f85149}
.auto-msg{text-align:center;font-size:13px;color:#8b949e;min-height:20px;padding:4px}
.progress-track{height:3px;background:#21262d;border-radius:2px;margin:0 20px 8px}
.progress-fill{height:100%;background:#58a6ff;border-radius:2px;width:0%;transition:width 0.3s}

/* Buttons */
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-main{background:#238636;color:#fff;font-size:16px;flex:1;max-width:200px}
.btn-sec{background:#21262d;color:#c9d1d9}
.btn-sec:active,.btn-main:active{opacity:0.7}
label.btn-sec{display:inline-flex;align-items:center;gap:4px}
label.btn-sec input{display:none}

/* Manual Input */
.manual{display:flex;gap:6px;margin-bottom:12px}
.manual input{flex:1;padding:10px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;text-align:center}
.manual button{padding:10px 16px;border-radius:8px;border:none;background:#238636;color:#fff;font-size:16px;cursor:pointer}

/* Status */
.status{text-align:center;font-size:12px;color:#8b949e;margin-bottom:8px}

/* Result Card */
.result{display:none;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.result.show{display:block}
.result .code{font-size:16px;font-weight:bold;color:#58a6ff;word-break:break-all;margin-bottom:8px}
.result .time{font-size:11px;color:#8b949e;margin-bottom:8px}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:bold;margin-bottom:8px}
.badge.normal{background:#1a3a1a;color:#2ea043;border:1px solid #2ea043}
.badge.glass{background:#1a2a3a;color:#58a6ff;border:1px solid #58a6ff}
.storage{font-size:42px;font-weight:bold;color:#e6edf3}
.storage span{font-size:16px;color:#8b949e}
.chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.chip{background:#21262d;padding:4px 10px;border-radius:12px;font-size:12px;color:#c9d1d9}

/* Confirm/Correct */
.actions{display:none;gap:8px;justify-content:center;margin-bottom:10px}
.actions.show{display:flex}
.correction{display:none;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:10px}
.correction.show{display:block}
.correction select,.correction input{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px}

/* Chat */
.chat-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px;margin-bottom:12px}
.chat-msgs{max-height:150px;overflow-y:auto;margin-bottom:8px;font-size:13px}
.chat-msgs .msg{padding:4px 0;border-bottom:1px solid #21262d}
.chat-msgs .from{color:#58a6ff;font-weight:bold}
.chat-row{display:flex;gap:6px}
.chat-row input{flex:1;padding:8px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px}
.chat-row button{padding:8px 14px;border-radius:6px;border:none;background:#238636;color:#fff;cursor:pointer;font-size:13px}

/* Training */
.train-toggle{text-align:center;margin-bottom:10px}
.train-toggle button{background:none;border:1px solid #30363d;color:#8b949e;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.train-panel{display:none;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:12px}
.train-panel.show{display:block}
.train-panel input{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px}
.train-list{max-height:100px;overflow-y:auto;margin:8px 0;font-size:12px;color:#8b949e}

/* Loading */
.loading{display:none;text-align:center;padding:20px;color:#8b949e}
.loading.show{display:block}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #30363d;border-top:3px solid #58a6ff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{display:none;text-align:center;padding:10px;color:#f85149;font-size:13px}
.error.show{display:block}
</style>
</head>
<body>
<div class="app">
<h1>مصنّف الذاكرة</h1>

<!-- Camera -->
<div class="cam-box" id="camBox">
  <video id="video" autoplay playsinline muted></video>
  <div class="focus-rect"></div>
</div>
<div class="quality-bar">
  <span>حدة <span class="q-dot" id="qSharp"></span></span>
  <span>ثبات <span class="q-dot" id="qStable"></span></span>
  <span>إضاءة <span class="q-dot" id="qLight"></span></span>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="auto-msg" id="autoMsg">جاري تشغيل الكاميرا...</div>

<!-- Buttons -->
<div class="btns">
  <button class="btn btn-main" onclick="tapCapture()">📸 صوّر</button>
  <button class="btn btn-sec" id="flashBtn" onclick="toggleFlash()">🔦 فلاش</button>
  <label class="btn btn-sec">📁 ملف<input type="file" accept="image/*" onchange="handleFile(event)"></label>
</div>

<!-- Manual Input -->
<div class="manual">
  <input type="text" id="manualCode" placeholder="اكتب الكود يدوي...">
  <button onclick="searchManual()">🔍</button>
</div>

<!-- Status -->
<div class="status" id="statusText">جاهز</div>

<!-- Loading -->
<div class="loading" id="loading"><div class="spinner"></div><div style="margin-top:8px">جاري التحليل...</div></div>

<!-- Error -->
<div class="error" id="errorMsg"></div>

<!-- Result Card -->
<div class="result" id="resultCard">
  <div class="code" id="resCode"></div>
  <div class="time" id="resTime"></div>
  <div id="resBadge"></div>
  <div class="storage"><span id="resStorage">?</span> <span>GB</span></div>
  <div class="chips" id="resChips"></div>
</div>

<!-- Confirm / Correct -->
<div class="actions" id="confirmActions">
  <button class="btn btn-sec" onclick="confirmOk()" style="background:#1a3a1a;color:#2ea043">✅ صح</button>
  <button class="btn btn-sec" onclick="showCorrection()" style="background:#3a1a1a;color:#f85149">❌ غلط</button>
</div>
<div class="correction" id="correctionForm">
  <select id="correctStorage">
    <option value="">-- المساحة الصح --</option>
    <option>8</option><option>16</option><option>32</option><option>64</option>
    <option>128</option><option>256</option><option>512</option>
  </select>
  <select id="correctType">
    <option value="عادي">عادي</option>
    <option value="زجاجي">زجاجي</option>
  </select>
  <input type="text" id="correctRam" placeholder="الرام (اختياري)">
  <button class="btn btn-main" onclick="submitCorrection()" style="margin-top:6px;width:100%">💾 حفظ</button>
</div>

<!-- Chat -->
<div class="chat-box">
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-row">
    <input type="text" id="chatInput" placeholder="اسأل عن كود...">
    <button onclick="sendChat()">إرسال</button>
  </div>
</div>

<!-- Training -->
<div class="train-toggle"><button onclick="toggleTraining()" id="trainBtn">🎓 صور التدريب (0)</button></div>
<div class="train-panel" id="trainPanel">
  <div style="font-size:12px;color:#8b949e;margin-bottom:6px">ارفع صور أمثلة عشان جيمناي يتعلم يفكك أحسن</div>
  <input type="text" id="trainLabel" placeholder="وصف (مثلاً: زجاجي Samsung)">
  <label class="btn btn-sec" style="margin:6px 0;width:100%;justify-content:center">📷 ارفع صورة<input type="file" accept="image/*" id="trainFile"></label>
  <button class="btn btn-sec" onclick="uploadTraining()" style="width:100%">⬆️ رفع</button>
  <div class="train-list" id="trainList"></div>
  <button class="btn btn-sec" onclick="clearTraining()" style="width:100%;margin-top:4px;color:#f85149">🗑️ مسح الكل</button>
</div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
var stream = null, imageCapture = null, cameraActive = false, flashActive = false;
var bestCameraId = null, prevFrame = null, autoInterval = null, autoProgress = 0;
var isAnalyzing = false, currentCode = '', lastParsed = null;
var chatHistory = [];
var sessionId = 'sid_' + Date.now();
var SAMSUNG_RAM_MAP = {S:'1','2':'1','6':'1.5',K:'2','1':'2','3':'2',A:'3',B:'3','8':'3',D:'4','4':'6',C:'6',J:'8',P:'8',L:'10',M:'12'};

// ══════════════════════════════════════════
// Camera (exact settings from old app)
// ══════════════════════════════════════════
async function findBestCamera() {
  if (bestCameraId) return bestCameraId;
  try {
    var temp = await navigator.mediaDevices.getUserMedia({video:true});
    temp.getTracks().forEach(function(t){t.stop();});
    var devices = await navigator.mediaDevices.enumerateDevices();
    var cams = devices.filter(function(d){return d.kind==='videoinput';});
    if (cams.length <= 1) return null;
    var best = null, bestRes = 0;
    for (var i=0; i<cams.length; i++) {
      try {
        var ts = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cams[i].deviceId}}});
        var track = ts.getVideoTracks()[0];
        var caps = track.getCapabilities ? track.getCapabilities() : {};
        var maxW = (caps.width && caps.width.max) ? caps.width.max : 0;
        if (maxW > bestRes) { bestRes = maxW; best = cams[i].deviceId; }
        ts.getTracks().forEach(function(t){t.stop();});
      } catch(e) {}
    }
    if (best) { bestCameraId = best; }
    return best;
  } catch(e) { return null; }
}

async function startCamera() {
  if (stream) { try { stream.getTracks().forEach(function(t){t.stop();}); } catch(x){} stream = null; }
  imageCapture = null;
  var camId = await findBestCamera();
  // Attempt 1: exact deviceId + 4K
  if (camId) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{deviceId:{exact:camId},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'}, audio:false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 2: facingMode environment + 4K
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'}, audio:false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 3: facingMode environment + 1080p
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}, audio:false
      });
    } catch(e) { stream = null; }
  }
  if (!stream) { setStatus('لا يمكن فتح الكاميرا — استخدم زر ملف'); return false; }
  var video = document.getElementById('video');
  video.srcObject = stream;
  video.muted = true;
  await new Promise(function(r){ video.onloadedmetadata = function(){ video.play().then(r).catch(r); }; setTimeout(r,3000); });
  // ImageCapture
  try {
    if ('ImageCapture' in window) {
      var track = stream.getVideoTracks()[0];
      var ic = new ImageCapture(track);
      await ic.grabFrame();
      imageCapture = ic;
    }
  } catch(e) { imageCapture = null; }
  cameraActive = true;
  startQualityMonitor();
  setAutoMsg('وجّه الكاميرا على شريحة الذاكرة');
  return true;
}

async function toggleFlash() {
  if (!stream) return;
  flashActive = !flashActive;
  try {
    var track = stream.getVideoTracks()[0];
    await track.applyConstraints({advanced:[{torch:flashActive}]});
    document.getElementById('flashBtn').textContent = flashActive ? '🔦 ON' : '🔦 فلاش';
  } catch(e) { flashActive = false; }
}

// ══════════════════════════════════════════
// Quality Monitoring
// ══════════════════════════════════════════
function startQualityMonitor() {
  if (autoInterval) clearInterval(autoInterval);
  autoProgress = 0; prevFrame = null;
  autoInterval = setInterval(analyzeFrame, 800);
}
function stopQualityMonitor() {
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  autoProgress = 0; prevFrame = null;
}

function analyzeFrame() {
  if (!stream || isAnalyzing) return;
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas || video.videoWidth === 0) return;
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  var cx = Math.floor(canvas.width*0.25), cy = Math.floor(canvas.height*0.25);
  var cw = Math.floor(canvas.width*0.5), ch = Math.floor(canvas.height*0.5);
  var imgData = ctx.getImageData(cx, cy, cw, ch);
  var data = imgData.data;
  // Sharpness (Laplacian)
  var sharp = 0;
  for (var y=1; y<ch-1; y+=4) {
    for (var x=1; x<cw-1; x+=4) {
      var idx=(y*cw+x)*4;
      var center=data[idx], top=data[((y-1)*cw+x)*4]||0, bottom=data[((y+1)*cw+x)*4]||0;
      var left=data[(y*cw+(x-1))*4]||0, right=data[(y*cw+(x+1))*4]||0;
      sharp += Math.abs(4*center - top - bottom - left - right);
    }
  }
  sharp = Math.min(sharp/1000, 100);
  // Stability
  var stability = 50;
  if (prevFrame && prevFrame.length === data.length) {
    var diff=0;
    for (var i=0; i<data.length; i+=16) diff += Math.abs(data[i]-prevFrame[i]);
    diff /= (data.length/16);
    stability = Math.max(0, 100 - diff*2);
  }
  prevFrame = new Uint8ClampedArray(data);
  // Brightness
  var brightness=0;
  for (var i=0; i<data.length; i+=4) brightness += (data[i]+data[i+1]+data[i+2])/3;
  brightness /= (data.length/4);
  var qS = sharp>15?'good':sharp>8?'warn':'bad';
  var qT = stability>70?'good':stability>40?'warn':'bad';
  var qL = (brightness>60&&brightness<220)?'good':brightness>30?'warn':'bad';
  document.getElementById('qSharp').className = 'q-dot '+qS;
  document.getElementById('qStable').className = 'q-dot '+qT;
  document.getElementById('qLight').className = 'q-dot '+qL;
  var allGood = qS==='good' && qT==='good' && qL==='good';
  if (allGood) autoProgress = Math.min(100, autoProgress+3);
  else autoProgress = Math.max(0, autoProgress-5);
  document.getElementById('progressFill').style.width = autoProgress+'%';
  if (qL==='bad') setAutoMsg('الإضاءة ضعيفة');
  else if (qS==='bad') setAutoMsg('قرّب أكتر');
  else if (qT==='bad') setAutoMsg('ثبّت إيدك');
  else if (allGood && autoProgress<100) setAutoMsg('ممتاز! ثبّت... '+autoProgress+'%');
  else if (allGood) setAutoMsg('جاهز! اضغط صوّر');
}

// ══════════════════════════════════════════
// Capture & Crop
// ══════════════════════════════════════════
function cropToFocusBox(srcCanvas, vw, vh) {
  var bw = vw * 0.25, bh = bw / 1.2;
  var bx = (vw - bw) / 2, by = (vh - bh) / 2;
  var c = document.createElement('canvas');
  c.width = bw; c.height = bh;
  c.getContext('2d').drawImage(srcCanvas, bx, by, bw, bh, 0, 0, bw, bh);
  return c;
}

function tapCapture() {
  if (!stream || !cameraActive || isAnalyzing) return;
  stopQualityMonitor();
  captureAndAnalyze();
}

async function captureAndAnalyze() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas) return;
  var ctx = canvas.getContext('2d');
  var w = video.videoWidth || 1280, h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  if (imageCapture) {
    try {
      var blob = await imageCapture.takePhoto();
      var img = new Image();
      img.onload = function() {
        canvas.width = img.width; canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        var cropped = cropToFocusBox(canvas, img.width, img.height);
        sendToGemini(cropped.toDataURL('image/jpeg',1.0).split(',')[1]);
      };
      img.src = URL.createObjectURL(blob);
      return;
    } catch(e) {}
  }
  ctx.drawImage(video, 0, 0, w, h);
  var cropped = cropToFocusBox(canvas, w, h);
  sendToGemini(cropped.toDataURL('image/jpeg',1.0).split(',')[1]);
}

function handleFile(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { sendToGemini(e.target.result.split(',')[1]); };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
// Send to Gemini (simple — no racing)
// ══════════════════════════════════════════
async function sendToGemini(base64) {
  if (isAnalyzing) return;
  isAnalyzing = true;
  showLoading(true); hideResult(); hideError();
  hideActions();
  setStatus('جاري التحليل...');
  var startTime = Date.now();
  try {
    var res = await fetch('/api/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({imageBase64:base64, sessionId:sessionId})
    });
    var data = await res.json();
    var elapsed = ((Date.now()-startTime)/1000).toFixed(1);
    if (data.error) { showError(data.error); setStatus('خطأ'); }
    else if (!data.code || data.code === 'NOT_FOUND') { showError('مش لاقي شريحة ذاكرة — جرب تاني أو اكتب الكود يدوي'); setStatus('مش لاقي'); }
    else {
      currentCode = data.code; lastParsed = data;
      document.getElementById('manualCode').value = currentCode;
      displayResult(data);
      setStatus((data.step||'gemini') + ' (' + elapsed + 's)');
      showActions();
    }
  } catch(e) { showError('خطأ في الاتصال — جرب تاني'); setStatus('خطأ'); }
  showLoading(false);
  isAnalyzing = false;
  if (stream && cameraActive) setTimeout(startQualityMonitor, 1500);
}

// ══════════════════════════════════════════
// Manual Search
// ══════════════════════════════════════════
function searchManual() {
  var code = document.getElementById('manualCode').value.trim();
  if (!code || code.length < 3) return;
  currentCode = code.toUpperCase();
  // Try local DB first
  var local = localSearch(currentCode);
  if (local) {
    lastParsed = {code:currentCode, storage:local.storage, type:local.type, ram:local.ram||extractRam(currentCode), company:local.company||detectCompany(currentCode)};
    displayResult(lastParsed);
    showActions();
    setStatus('DB محلي');
    return;
  }
  // Fallback: server lookup
  fetch('/api/lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:currentCode})})
  .then(function(r){return r.json();}).then(function(d){
    if (d.found) {
      lastParsed = d;
      displayResult(d);
      showActions();
      setStatus('DB سيرفر');
    } else {
      showError('كود مش في القاعدة — جرب صوّر الشريحة');
      setStatus('مش لاقي');
    }
  });
}

// ══════════════════════════════════════════

function localSearch(code) {
  var u = code.toUpperCase().trim();
  for (var cap in NORMAL_DB) {
    for (var i=0; i<NORMAL_DB[cap].length; i++) {
      if (u === NORMAL_DB[cap][i].toUpperCase() || u.startsWith(NORMAL_DB[cap][i].toUpperCase().split('-')[0])) {
        var p = cap.split('+');
        return {storage:p[0], type:'عادي', ram:p[1]?p[1].replace(/D[0-9]/g,'').trim():null, company:detectCompany(u)};
      }
    }
  }
  for (var size in EMMC_DB) {
    for (var i=0; i<EMMC_DB[size].length; i++) {
      if (u === EMMC_DB[size][i].toUpperCase() || u.startsWith(EMMC_DB[size][i].toUpperCase().split('-')[0])) return {storage:size, type:'زجاجي', company:detectCompany(u)};
    }
  }
  for (var size in MICRON_DB) {
    for (var i=0; i<MICRON_DB[size].length; i++) {
      if (u === MICRON_DB[size][i].toUpperCase()) return {storage:size, type:'زجاجي', company:'Micron'};
    }
  }
  // Shortcuts
  var sMap = {N:'8',E:'16',X:'32',D:'32',C:'64',H:'64',P:'64',G:'128',V:'128',F:'256',S:'256'};
  if (u.startsWith('KM') && !u.startsWith('KLM') && !u.startsWith('KLU')) {
    var m = u.match(/([NEXDCHPGVFS])(000|100|200|600|700|800|900)/);
    if (m && sMap[m[1]]) return {storage:sMap[m[1]], type:'عادي', company:'Samsung'};
  }
  if (u.startsWith('KLM') || u.startsWith('KLU')) {
    var eMap = {AG:'16',BG:'32',CG:'64',DG:'128',EG:'256',FG:'512'};
    for (var k in eMap) { if (u.includes(k)) return {storage:eMap[k], type:'زجاجي', company:'Samsung'}; }
  }
  if (u.startsWith('H9')) {
    var hMap = {'17':'16','18':'16','26':'32','27':'32','52':'64','53':'64','16':'128'};
    var num = u.substring(4,6);
    if (hMap[num]) return {storage:hMap[num], type:'عادي', company:'SK Hynix'};
  }
  if (u.startsWith('H26') || u.startsWith('H28') || u.startsWith('HN')) return {type:'زجاجي', company:'SK Hynix'};
  if (u.startsWith('THG')) {
    var tMap = {G7:'16',G8:'32',G9:'64',T0:'128',T1:'256',T2:'512'};
    var key = u.substring(6,8);
    if (tMap[key]) return {storage:tMap[key], type:'زجاجي', company:'Toshiba'};
  }
  if (u.startsWith('SDIN') || u.startsWith('SDAD')) {
    var gm = u.match(/(\d+)G/);
    if (gm) return {storage:gm[1], type:'زجاجي', company:'SanDisk'};
  }
  return null;
}

function detectCompany(code) {
  var u = (code||'').toUpperCase();
  if (/^KM|^KLM|^KLU/.test(u)) return 'Samsung';
  if (/^H9|^H2[68]|^HN/.test(u)) return 'SK Hynix';
  if (/^THG/.test(u)) return 'Toshiba';
  if (/^SDI|^SDA/.test(u)) return 'SanDisk';
  if (/^J[WZ]/.test(u)) return 'Micron';
  if (/^TY|^YMEC/.test(u)) return 'YMEC';
  if (/^(08|16)EM/.test(u)) return 'UNIC';
  return '';
}

function extractRam(code) {
  if (!code) return null;
  var u = code.toUpperCase();
  if (u.startsWith('KM') && !u.startsWith('KLM') && !u.startsWith('KLU')) {
    var main = u.split('-')[0];
    if (main.length >= 3) { var ch = main[main.length-2]; if (SAMSUNG_RAM_MAP[ch]) return SAMSUNG_RAM_MAP[ch]; }
  }
  var HYNIX_RAM = {A4:'0.5',A8:'1',AB:'2',AD:'3',AC:'4',AE:'6'};
  if (u.startsWith('H9')) {
    var m = u.match(/H9[A-Z]{2}\d{2}([A-Z]{2})/);
    if (m && HYNIX_RAM[m[1]]) return HYNIX_RAM[m[1]];
  }
  return null;
}

function displayResult(d) {
  document.getElementById('resCode').textContent = d.code || '';
  document.getElementById('resTime').textContent = new Date().toLocaleTimeString('ar');
  var isGlass = d.type === 'زجاجي';
  document.getElementById('resBadge').innerHTML = '<div class="badge '+(isGlass?'glass':'normal')+'">'+(isGlass?'زجاجي':'عادي')+'</div>';
  document.getElementById('resStorage').textContent = d.storage || '?';
  var chips = '';
  var ram = d.ram || extractRam(d.code);
  if (ram) chips += '<div class="chip">RAM '+ram+' GB</div>';
  if (d.company) chips += '<div class="chip">'+d.company+'</div>';
  document.getElementById('resChips').innerHTML = chips;
  document.getElementById('resultCard').classList.add('show');
}

// ══════════════════════════════════════════
function confirmOk() {
  fetch('/api/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lastParsed||{})});
  hideActions();
  addChat('المساعد','تم التأكيد ✅');
}
function showCorrection() {
  document.getElementById('confirmActions').classList.remove('show');
  document.getElementById('correctionForm').classList.add('show');
}
function submitCorrection() {
  var s = document.getElementById('correctStorage').value;
  var t = document.getElementById('correctType').value;
  var r = document.getElementById('correctRam').value;
  if (!s) { addChat('المساعد','اختار المساحة الأول'); return; }
  fetch('/api/correct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:currentCode,correctStorage:s,correctType:t,correctRam:r})});
  displayResult({code:currentCode,storage:s,type:t,ram:r,company:detectCompany(currentCode)});
  document.getElementById('correctionForm').classList.remove('show');
  addChat('المساعد','تم التصحيح: '+currentCode+' = '+s+'GB '+t);
}

// ══════════════════════════════════════════
// Chat
// ══════════════════════════════════════════
function addChat(from, text) {
  var el = document.getElementById('chatMsgs');
  el.innerHTML += '<div class="msg"><span class="from">'+from+':</span> '+text+'</div>';
  el.scrollTop = el.scrollHeight;
}
function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addChat('أنا', msg);
  chatHistory.push({role:'user',text:msg});
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:lastParsed,history:chatHistory.slice(-10)})})
  .then(function(r){return r.json();}).then(function(d){
    addChat('المساعد', d.reply||'مفيش رد');
    chatHistory.push({role:'assistant',text:d.reply||''});
  }).catch(function(){ addChat('المساعد','خطأ — جرب تاني'); });
}

// Training
// ══════════════════════════════════════════
function toggleTraining() {
  var p = document.getElementById('trainPanel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) loadTraining();
}
function loadTraining() {
  fetch('/api/training').then(function(r){return r.json();}).then(function(d){
    document.getElementById('trainBtn').textContent = '🎓 صور التدريب ('+d.count+')';
    var list = document.getElementById('trainList');
    list.innerHTML = '';
    if (d.images && d.images.length > 0) {
      d.images.forEach(function(img,i){ list.innerHTML += '<div>'+(i+1)+'. '+(img.label||'بدون وصف')+'</div>'; });
    } else { list.innerHTML = '<div style="text-align:center;padding:8px">مفيش صور تدريب لسه</div>'; }
  });
}
function uploadTraining() {
  var file = document.getElementById('trainFile');
  var label = document.getElementById('trainLabel');
  if (!file.files || !file.files[0]) { alert('اختار صورة الأول'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    fetch('/api/training/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:e.target.result,label:label.value.trim()||null})})
    .then(function(r){return r.json();}).then(function(d){ if(d.success){loadTraining();label.value='';file.value='';alert('تم!');} });
  };
  reader.readAsDataURL(file.files[0]);
}
function clearTraining() {
  if (!confirm('متأكد تمسح كل صور التدريب؟')) return;
  fetch('/api/training/clear',{method:'POST',headers:{'Content-Type':'application/json'}}).then(function(r){return r.json();}).then(function(d){if(d.success)loadTraining();});
}
