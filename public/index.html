<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<title>مصنّف الذاكرة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;direction:rtl}
.app{max-width:480px;margin:0 auto;padding:8px;display:flex;flex-direction:column;height:100vh}
h1{text-align:center;font-size:18px;padding:6px 0;color:#58a6ff}

/* Camera */
.cam-box{position:relative;width:100%;aspect-ratio:4/3;background:#161b22;border-radius:12px;overflow:hidden;flex-shrink:0}
.cam-box video,.cam-box img{width:100%;height:100%;object-fit:cover}
.focus-rect{position:absolute;top:50%;left:50%;width:25%;aspect-ratio:1/1.2;transform:translate(-50%,-50%);border:2px solid #58a6ff;border-radius:6px;pointer-events:none}

/* Quality */
.quality-bar{display:flex;gap:8px;justify-content:center;padding:3px;font-size:11px;color:#8b949e}
.q-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:3px;background:#555}
.q-dot.good{background:#2ea043}.q-dot.warn{background:#d29922}.q-dot.bad{background:#f85149}
.progress-track{height:2px;background:#21262d;border-radius:2px;margin:0 20px 4px}
.progress-fill{height:100%;background:#58a6ff;border-radius:2px;width:0%;transition:width 0.3s}

/* Buttons row */
.btns{display:flex;gap:6px;justify-content:center;padding:4px 0;flex-shrink:0}
.btn{padding:8px 12px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-main{background:#238636;color:#fff;flex:1;max-width:160px}
.btn-sec{background:#21262d;color:#c9d1d9}
.btn-danger{background:#da3633;color:#fff}
.btn:active{opacity:0.7}

/* Chat (always visible) */
.chat-area{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:4px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:4px}
.chat-msg{padding:8px 10px;border-radius:10px;font-size:13px;max-width:88%;word-wrap:break-word;line-height:1.5}
.chat-msg.user{background:#238636;color:#fff;align-self:flex-start}
.chat-msg.bot{background:#161b22;border:1px solid #30363d;color:#e6edf3;align-self:flex-end}
.chat-msg.system{background:#0d1117;border:1px solid #58a6ff;color:#58a6ff;align-self:center;text-align:center;font-size:12px}
.chat-msg.result{background:#161b22;border:1px solid #2ea043;color:#e6edf3;align-self:center;width:100%;text-align:center}
.result-line{font-size:14px;padding:2px 0}
.result-code{font-weight:bold;color:#58a6ff;font-size:15px}
.chat-input-row{display:flex;gap:6px;padding:6px 0;flex-shrink:0}
.chat-input{flex:1;padding:8px 10px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#e6edf3;font-size:13px;font-family:inherit}
.chat-send{padding:8px 14px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}

/* Training (hidden file input) */
.train-row{display:flex;gap:4px;align-items:center;justify-content:center;padding:2px 0;font-size:11px;color:#8b949e;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<h1>مصنّف الذاكرة</h1>

<!-- Camera -->
<div class="cam-box">
  <video id="video" autoplay playsinline muted></video>
  <img id="capturedImg" style="display:none">
  <div class="focus-rect" id="focusRect"></div>
</div>
<div class="quality-bar" id="qualityBar">
  <span>حدة <span class="q-dot" id="qSharp"></span></span>
  <span>ثبات <span class="q-dot" id="qStable"></span></span>
  <span>إضاءة <span class="q-dot" id="qLight"></span></span>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<!-- Buttons -->
<div class="btns">
  <button class="btn btn-main" id="captureBtn" onclick="tapCapture()">📸 صوّر</button>
  <button class="btn btn-main" id="nextBtn" onclick="newPhoto()" style="display:none">📸 صورة جديدة</button>
  <button class="btn btn-sec" id="flashBtn" onclick="toggleFlash()">🔦</button>
</div>

<!-- Chat (always visible) -->
<div class="chat-area">
  <div class="chat-msgs" id="chatMsgs">
    <div class="chat-msg system">وجّه الكاميرا على شريحة الذاكرة واضغط صوّر</div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="اكتب لجيميناي..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">ارسل</button>
  </div>
</div>

<!-- Training -->
<div class="train-row">
  <span id="trainCount">تدريب: 0</span>
  <button class="btn btn-sec" style="padding:4px 8px;font-size:11px" onclick="uploadTraining()">📤 ارفع تدريب</button>
  <button class="btn btn-sec" style="padding:4px 8px;font-size:11px;background:#da3633;color:#fff" onclick="clearTraining()">🗑</button>
  <input type="file" id="trainFile" accept="image/*" style="display:none" onchange="handleTrainFile(event)">
</div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
var stream = null, imageCapture = null, cameraActive = false, flashActive = false;
var bestCameraId = null, prevFrame = null, autoInterval = null, autoProgress = 0;
var isAnalyzing = false;
var sessionId = 'sess_' + Date.now();
var lastResult = null;
var lastImageBase64 = null;
var chatHistory = [];

// ══════════════════════════════════════════
// Camera (v25 exact settings)
// ══════════════════════════════════════════
async function findBestCamera() {
  if (bestCameraId) return bestCameraId;
  try {
    var temp = await navigator.mediaDevices.getUserMedia({video:true});
    temp.getTracks().forEach(function(t){t.stop();});
    var devices = await navigator.mediaDevices.enumerateDevices();
    var cams = devices.filter(function(d){return d.kind==='videoinput';});
    if (cams.length <= 1) return null;
    var best = null, bestRes = 0;
    for (var i=0; i<cams.length; i++) {
      try {
        var ts = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cams[i].deviceId}}});
        var track = ts.getVideoTracks()[0];
        var caps = track.getCapabilities ? track.getCapabilities() : {};
        var maxW = (caps.width && caps.width.max) ? caps.width.max : 0;
        if (maxW > bestRes) { bestRes = maxW; best = cams[i].deviceId; }
        ts.getTracks().forEach(function(t){t.stop();});
      } catch(e) {}
    }
    if (best) bestCameraId = best;
    return best;
  } catch(e) { return null; }
}

async function startCamera() {
  if (stream) { try { stream.getTracks().forEach(function(t){t.stop();}); } catch(x){} stream = null; }
  imageCapture = null;
  var camId = await findBestCamera();
  if (camId) {
    try { stream = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:camId},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'},audio:false}); } catch(e) { stream = null; }
  }
  if (!stream) {
    try { stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'},audio:false}); } catch(e) { stream = null; }
  }
  if (!stream) {
    try { stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false}); } catch(e) { stream = null; }
  }
  if (!stream) { addMsg('مفيش كاميرا متاحة','system'); return false; }
  var video = document.getElementById('video');
  video.srcObject = stream; video.muted = true;
  await new Promise(function(r){ video.onloadedmetadata = function(){ video.play().then(r).catch(r); }; setTimeout(r,3000); });
  try {
    if ('ImageCapture' in window) { var track = stream.getVideoTracks()[0]; var ic = new ImageCapture(track); await ic.grabFrame(); imageCapture = ic; }
  } catch(e) { imageCapture = null; }
  cameraActive = true;
  startQualityMonitor();
  return true;
}

async function toggleFlash() {
  if (!stream) return;
  flashActive = !flashActive;
  try { var track = stream.getVideoTracks()[0]; await track.applyConstraints({advanced:[{torch:flashActive}]}); document.getElementById('flashBtn').textContent = flashActive ? '🔦 ON' : '🔦'; } catch(e) { flashActive = false; }
}

// ══════════════════════════════════════════
// Quality Monitoring (v25)
// ══════════════════════════════════════════
function startQualityMonitor() { if (autoInterval) clearInterval(autoInterval); autoProgress = 0; prevFrame = null; autoInterval = setInterval(analyzeFrame, 800); }
function stopQualityMonitor() { if (autoInterval) { clearInterval(autoInterval); autoInterval = null; } autoProgress = 0; prevFrame = null; }

function analyzeFrame() {
  if (!stream || isAnalyzing) return;
  var video = document.getElementById('video'), canvas = document.getElementById('canvas');
  if (!video || !canvas || video.videoWidth === 0) return;
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  var cx = Math.floor(canvas.width*0.25), cy = Math.floor(canvas.height*0.25);
  var cw = Math.floor(canvas.width*0.5), ch = Math.floor(canvas.height*0.5);
  var imgData = ctx.getImageData(cx, cy, cw, ch), data = imgData.data;
  var sharp = 0;
  for (var y=1; y<ch-1; y+=4) { for (var x=1; x<cw-1; x+=4) { var idx=(y*cw+x)*4; sharp += Math.abs(4*data[idx] - (data[((y-1)*cw+x)*4]||0) - (data[((y+1)*cw+x)*4]||0) - (data[(y*cw+(x-1))*4]||0) - (data[(y*cw+(x+1))*4]||0)); } }
  sharp = Math.min(sharp/1000, 100);
  var stability = 50;
  if (prevFrame && prevFrame.length === data.length) { var diff=0; for (var i=0; i<data.length; i+=16) diff += Math.abs(data[i]-prevFrame[i]); diff /= (data.length/16); stability = Math.max(0, 100 - diff*2); }
  prevFrame = new Uint8ClampedArray(data);
  var brightness=0; for (var i=0; i<data.length; i+=4) brightness += (data[i]+data[i+1]+data[i+2])/3; brightness /= (data.length/4);
  var qS = sharp>15?'good':sharp>8?'warn':'bad';
  var qT = stability>70?'good':stability>40?'warn':'bad';
  var qL = (brightness>60&&brightness<220)?'good':brightness>30?'warn':'bad';
  document.getElementById('qSharp').className = 'q-dot '+qS;
  document.getElementById('qStable').className = 'q-dot '+qT;
  document.getElementById('qLight').className = 'q-dot '+qL;
  var allGood = qS==='good' && qT==='good' && qL==='good';
  if (allGood) autoProgress = Math.min(100, autoProgress+3); else autoProgress = Math.max(0, autoProgress-5);
  document.getElementById('progressFill').style.width = autoProgress+'%';
}

// ══════════════════════════════════════════
// Capture → Freeze → Gemini replies in chat
// ══════════════════════════════════════════
function cropToFocusBox(srcCanvas, vw, vh) {
  var bw = vw * 0.25, bh = bw / 1.2;
  var bx = (vw - bw) / 2, by = (vh - bh) / 2;
  var c = document.createElement('canvas');
  c.width = bw; c.height = bh;
  c.getContext('2d').drawImage(srcCanvas, bx, by, bw, bh, 0, 0, bw, bh);
  return c;
}

function tapCapture() {
  if (!stream || !cameraActive || isAnalyzing) return;
  stopQualityMonitor();
  captureAndAnalyze();
}

async function captureAndAnalyze() {
  isAnalyzing = true;
  document.getElementById('captureBtn').textContent = '⏳ جاري...';
  var video = document.getElementById('video'), canvas = document.getElementById('canvas');
  if (!video || !canvas) return;
  var ctx = canvas.getContext('2d');
  var w = video.videoWidth || 1280, h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  var base64 = null;

  if (imageCapture) {
    try {
      var blob = await imageCapture.takePhoto();
      var img = await createImageBitmap(blob);
      canvas.width = img.width; canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      var cropped = cropToFocusBox(canvas, img.width, img.height);
      base64 = cropped.toDataURL('image/jpeg',1.0).split(',')[1];
    } catch(e) { base64 = null; }
  }
  if (!base64) {
    ctx.drawImage(video, 0, 0, w, h);
    var cropped = cropToFocusBox(canvas, w, h);
    base64 = cropped.toDataURL('image/jpeg',1.0).split(',')[1];
  }
  lastImageBase64 = base64;

  // Freeze image on screen
  freezeImage(base64);
  addMsg('بحلل الصورة...', 'system');

  try {
    var resp = await fetch('/api/analyze', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: base64, sessionId: sessionId })
    });
    var data = await resp.json();
    // Remove "analyzing" message
    removeLastSystem();

    if (data.error) {
      addMsg(data.error, 'system');
    } else if (!data.code || data.code === 'NOT_FOUND') {
      addMsg('مش عارف أقرا الكود — جرّب تاني أو اسألني', 'bot');
    } else {
      lastResult = data;
      // Show result as chat message
      var txt = '📋 ' + data.code + '\n';
      txt += '💾 السعة: ' + (data.storage || '?') + 'GB\n';
      txt += '📦 النوع: ' + (data.type || '?') + '\n';
      txt += '🏭 الشركة: ' + (data.company || '?') + '\n';
      if (data.ram) txt += '🧠 الرام: ' + data.ram + 'GB\n';
      txt += '🎯 الدقة: ' + (data.confidence || 0) + '%';
      if (data.step) txt += ' (' + data.step + ')';
      addMsg(txt, 'bot');
    }
  } catch(err) {
    removeLastSystem();
    addMsg('خطأ في الاتصال — جرب تاني', 'system');
  }

  isAnalyzing = false;
  document.getElementById('captureBtn').textContent = '📸 صوّر';
}

function freezeImage(base64) {
  var img = document.getElementById('capturedImg');
  img.src = 'data:image/jpeg;base64,' + base64;
  img.style.display = 'block';
  document.getElementById('video').style.display = 'none';
  document.getElementById('focusRect').style.display = 'none';
  document.getElementById('qualityBar').style.display = 'none';
  document.getElementById('progressFill').parentElement.style.display = 'none';
  document.getElementById('captureBtn').style.display = 'none';
  document.getElementById('flashBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';
}

function newPhoto() {
  document.getElementById('capturedImg').style.display = 'none';
  document.getElementById('video').style.display = 'block';
  document.getElementById('focusRect').style.display = 'block';
  document.getElementById('qualityBar').style.display = 'flex';
  document.getElementById('progressFill').parentElement.style.display = 'block';
  document.getElementById('captureBtn').style.display = 'block';
  document.getElementById('flashBtn').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'none';
  startQualityMonitor();
}

// ══════════════════════════════════════════
// Chat (same Gemini, same image)
// ══════════════════════════════════════════
function addMsg(text, role) {
  var div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  div.style.whiteSpace = 'pre-wrap';
  document.getElementById('chatMsgs').appendChild(div);
  document.getElementById('chatMsgs').scrollTop = 99999;
}

function removeLastSystem() {
  var msgs = document.getElementById('chatMsgs');
  var last = msgs.lastChild;
  if (last && last.className.includes('system')) msgs.removeChild(last);
}

async function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  chatHistory.push({role:'user', text:msg});
  addMsg('...', 'bot');
  var loadingEl = document.getElementById('chatMsgs').lastChild;

  try {
    var resp = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, context: lastResult, history: chatHistory.slice(-10), imageBase64: lastImageBase64 })
    });
    var data = await resp.json();
    loadingEl.textContent = data.reply || 'مفيش رد';
    chatHistory.push({role:'bot', text:data.reply});
  } catch(e) { loadingEl.textContent = 'خطأ في الاتصال'; }
}

// ══════════════════════════════════════════
// Training
// ══════════════════════════════════════════
function loadTrainingCount() {
  fetch('/api/training').then(function(r){return r.json();}).then(function(d){
    document.getElementById('trainCount').textContent = 'تدريب: ' + d.count;
  }).catch(function(){});
}
function uploadTraining() { document.getElementById('trainFile').click(); }
function handleTrainFile(event) {
  var file = event.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result;
    var label = prompt('وصف الصورة (مثلاً: تفكيك عادي سامسونج)') || '';
    fetch('/api/training/add', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ imageBase64: b64, label: label })
    }).then(function(r){return r.json();}).then(function(d){
      if (d.success) { document.getElementById('trainCount').textContent = 'تدريب: ' + d.count; addMsg('تم إضافة صورة تدريب ✅', 'system'); }
    }).catch(function(){ addMsg('خطأ في رفع التدريب', 'system'); });
  };
  reader.readAsDataURL(file); event.target.value = '';
}
function clearTraining() {
  if (!confirm('متأكد تمسح كل صور التدريب؟')) return;
  fetch('/api/training/clear', {method:'POST'}).then(function(r){return r.json();}).then(function(){
    document.getElementById('trainCount').textContent = 'تدريب: 0';
    addMsg('تم مسح التدريب', 'system');
  }).catch(function(){});
}

// ══════════════════════════════════════════
// Init
// ══════════════════════════════════════════
window.addEventListener('load', function() { startCamera(); loadTrainingCount(); });
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
</body>
</html>
