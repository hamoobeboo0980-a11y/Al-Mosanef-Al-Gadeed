<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<title>مصنّف الذاكرة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;direction:rtl}
.app{max-width:480px;margin:0 auto;padding:12px}
h1{text-align:center;font-size:20px;padding:10px 0;color:#58a6ff}

/* Camera */
.cam-box{position:relative;width:100%;aspect-ratio:4/3;background:#161b22;border-radius:12px;overflow:hidden;margin-bottom:10px}
.cam-box video{width:100%;height:100%;object-fit:cover}
.focus-rect{position:absolute;top:50%;left:50%;width:30%;aspect-ratio:1.2/1;transform:translate(-50%,-50%);border:2px solid #58a6ff;border-radius:6px;pointer-events:none}

/* Quality */
.quality-bar{display:flex;gap:8px;justify-content:center;padding:4px;font-size:12px;color:#8b949e}
.q-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px;background:#555}
.q-dot.good{background:#2ea043}.q-dot.warn{background:#d29922}.q-dot.bad{background:#f85149}
.auto-msg{text-align:center;font-size:13px;color:#8b949e;min-height:20px;padding:4px}
.progress-track{height:3px;background:#21262d;border-radius:2px;margin:0 20px 8px}
.progress-fill{height:100%;background:#58a6ff;border-radius:2px;width:0%;transition:width 0.3s}

/* Buttons */
.btns{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-main{background:#238636;color:#fff;font-size:16px;flex:1;max-width:200px}
.btn-sec{background:#21262d;color:#c9d1d9}
.btn:active{opacity:0.7}
.status{text-align:center;font-size:12px;color:#8b949e;margin-bottom:8px}

/* Result Card */
.result-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;margin-bottom:12px;display:none}
.result-card.show{display:block}
.result-code{font-size:16px;font-weight:bold;color:#58a6ff;word-break:break-all;margin-bottom:8px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.result-item{background:#0d1117;border-radius:8px;padding:8px;text-align:center}
.result-label{font-size:11px;color:#8b949e}
.result-value{font-size:16px;font-weight:bold;margin-top:2px}
.result-confidence{text-align:center;font-size:11px;color:#8b949e;margin-top:8px}
.result-actions{display:flex;gap:8px;justify-content:center;margin-top:10px}
.btn-confirm{background:#238636;color:#fff;padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-correct{background:#d29922;color:#fff;padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-confirm:active,.btn-correct:active{opacity:0.7}
.correct-form{display:none;margin-top:8px;padding:8px;background:#0d1117;border-radius:8px}
.correct-form.show{display:block}
.correct-form input,.correct-form select{width:100%;padding:6px;margin-bottom:6px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#e6edf3;font-size:13px}
.frozen-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:5}
.frozen-overlay img{width:100%;height:100%;object-fit:cover}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:10px}
.tab{flex:1;padding:8px;text-align:center;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#8b949e;font-size:13px;cursor:pointer}
.tab.active{background:#21262d;color:#58a6ff;border-color:#58a6ff}

/* Chat */
.chat-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px;margin-bottom:12px;display:none}
.chat-box.show{display:block}
.chat-msgs{max-height:250px;overflow-y:auto;margin-bottom:8px}
.chat-msg{padding:6px 10px;margin-bottom:4px;border-radius:8px;font-size:13px;max-width:85%;word-wrap:break-word}
.chat-msg.user{background:#238636;color:#fff;margin-left:auto;text-align:left}
.chat-msg.bot{background:#21262d;color:#e6edf3}
.chat-input-row{display:flex;gap:6px}
.chat-input{flex:1;padding:8px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#e6edf3;font-size:13px;font-family:inherit}
.chat-send{padding:8px 14px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}

/* Training */
.train-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px;margin-bottom:12px;display:none}
.train-box.show{display:block}
.train-count{text-align:center;font-size:13px;color:#8b949e;margin-bottom:8px}
.train-btns{display:flex;gap:6px;justify-content:center}
.train-btns .btn{font-size:12px;padding:8px 12px}

/* Login Screen */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117;z-index:100;display:flex;align-items:center;justify-content:center}
.login-overlay.hidden{display:none}
.login-box{width:90%;max-width:380px;background:#161b22;border:1px solid #30363d;border-radius:16px;padding:24px;text-align:center}
.login-box h2{color:#58a6ff;margin-bottom:16px;font-size:22px}
.login-box input,.login-box select{width:100%;padding:10px;margin-bottom:10px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#e6edf3;font-size:14px;font-family:inherit}
.login-box select{appearance:auto}
.login-box .btn-login{width:100%;padding:12px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-bottom:8px}
.login-box .btn-login:active{opacity:0.7}
.login-box .switch-link{color:#58a6ff;font-size:13px;cursor:pointer;text-decoration:underline}
.login-box .err-msg{color:#f85149;font-size:13px;min-height:20px;margin-bottom:8px}

/* Top Bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.top-bar .user-info{font-size:12px;color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar .top-btns{display:flex;gap:6px}
.top-bar .top-btn{padding:8px 14px;border:none;border-radius:6px;font-size:14px;cursor:pointer;background:#21262d;color:#c9d1d9}
.top-bar .top-btn:active{opacity:0.7}
.img-counter{text-align:center;font-size:12px;color:#d29922;margin-bottom:6px}

/* History */
.history-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:10px;margin-bottom:12px;display:none;max-height:400px;overflow-y:auto}
.history-box.show{display:block}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #21262d;font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-code{color:#58a6ff;font-weight:bold;font-size:13px}
.hist-info{color:#8b949e;font-size:11px}
.hist-date{color:#484f58;font-size:10px}

/* Report Failed */
.btn-report{background:#da3633;color:#fff;padding:8px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;width:100%}
.btn-report:active{opacity:0.7}
.report-msg{text-align:center;font-size:12px;color:#2ea043;margin-top:6px;min-height:18px}

/* Admin Panel */
.admin-panel{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px;margin-bottom:12px;display:none}
.admin-panel.show{display:block}
.admin-panel h3{color:#58a6ff;font-size:15px;margin-bottom:10px}
.admin-table{width:100%;font-size:11px;border-collapse:collapse}
.admin-table th,.admin-table td{padding:6px 4px;border-bottom:1px solid #21262d;text-align:right}
.admin-table th{color:#8b949e;font-weight:normal}
.admin-table td{color:#e6edf3}
.admin-credits{display:flex;gap:6px;margin-top:8px;align-items:center}
.admin-credits input{flex:1;padding:6px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#e6edf3;font-size:12px}
.admin-credits button{padding:6px 12px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}

/* Payment Prompt */
.payment-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:90;display:none;align-items:center;justify-content:center}
.payment-overlay.show{display:flex}
.payment-box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:24px;text-align:center;max-width:340px;width:90%}
.payment-box h3{color:#d29922;margin-bottom:12px}
.payment-box p{color:#e6edf3;font-size:14px;margin-bottom:16px;line-height:1.6}
.payment-box .vodafone-num{font-size:22px;color:#e5002b;font-weight:bold;letter-spacing:2px;margin:10px 0}
.payment-box .btn-close-pay{padding:10px 20px;background:#21262d;color:#c9d1d9;border:none;border-radius:8px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<!-- Login/Register Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2 id="loginTitle">تسجيل الدخول</h2>
    <div class="err-msg" id="loginErr"></div>
    <input id="loginPhone" type="tel" placeholder="رقم الموبايل">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <!-- Registration extra fields -->
    <div id="regFields" style="display:none">
      <input id="regName" placeholder="الاسم (اختياري)">
      <select id="regJobType">
        <option value="">نوع الوظيفة...</option>
        <option value="تاجر">تاجر</option>
        <option value="مهندس صيانة">مهندس صيانة</option>
        <option value="أخرى">أخرى</option>
      </select>
      <input id="regAddress" placeholder="العنوان (اختياري)">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
    <div><span class="switch-link" id="switchLink" onclick="toggleLoginMode()">مستخدم جديد؟ سجّل هنا</span></div>
  </div>
</div>

<!-- (Payment overlay removed — free for now) -->

<div class="app">

<!-- Top Bar -->
<div class="top-bar">
  <div class="user-info" id="userInfo"></div>
  <div class="top-btns">
    <button class="top-btn" id="langBtn" onclick="toggleLang()">EN</button>
    <button class="top-btn" id="logoutBtn" onclick="doLogout()" data-t="logout">خروج</button>
  </div>
</div>

<h1 id="appTitle">مصنّف الذاكرة</h1>
<div class="img-counter" id="imgCounter"></div>

<!-- Camera -->
<div class="cam-box">
  <video id="video" autoplay playsinline muted></video>
  <div class="frozen-overlay" id="frozenOverlay"><img id="frozenImg"></div>
  <div class="focus-rect"></div>
</div>
<div class="quality-bar">
  <span>حدة <span class="q-dot" id="qSharp"></span></span>
  <span>ثبات <span class="q-dot" id="qStable"></span></span>
  <span>إضاءة <span class="q-dot" id="qLight"></span></span>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="auto-msg" id="autoMsg">جاري تشغيل الكاميرا...</div>

<!-- Buttons -->
<div class="btns">
  <button class="btn btn-main" id="captureBtn" onclick="tapCapture()">📸 صوّر</button>
  <button class="btn btn-sec" id="flashBtn" onclick="toggleFlash()">🔦 فلاش</button>
</div>
<div class="status" id="statusText">جاهز</div>

<!-- Result -->
<div class="result-card" id="resultCard">
  <div class="result-code" id="resCode"></div>
  <div class="result-grid">
    <div class="result-item"><div class="result-label">السعة</div><div class="result-value" id="resStorage">-</div></div>
    <div class="result-item"><div class="result-label">النوع</div><div class="result-value" id="resType">-</div></div>
    <div class="result-item"><div class="result-label">الرام</div><div class="result-value" id="resRam">-</div></div>
    <div class="result-item"><div class="result-label">الشركة</div><div class="result-value" id="resCompany">-</div></div>
  </div>
  <div class="result-confidence" id="resConf"></div>
  <div class="result-actions">
    <button class="btn-confirm" onclick="confirmResult()">✅ صح</button>
    <button class="btn-correct" onclick="showCorrectForm()">✏️ تصحيح</button>
  </div>
  <button class="btn-report" id="reportBtn" style="display:none" onclick="reportFailed()" data-t="report_btn">📩 إرسال للشركة</button>
  <div class="report-msg" id="reportMsg"></div>
  <div class="correct-form" id="correctForm">
    <input id="corrCode" placeholder="الكود الصحيح">
    <input id="corrStorage" placeholder="السعة (مثلاً 64)">
    <select id="corrType"><option value="عادي">عادي</option><option value="زجاجي">زجاجي</option></select>
    <input id="corrCompany" placeholder="الشركة">
    <input id="corrRam" placeholder="الرام (مثلاً 4)">
    <button class="btn-confirm" onclick="submitCorrection()" style="width:100%;margin-top:4px">✅ حفظ التصحيح</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabsBar">
  <div class="tab active" onclick="switchTab('cam')">📸 <span data-t="tab_cam">كاميرا</span></div>
  <div class="tab" onclick="switchTab('history')">📋 <span data-t="tab_history">السجل</span></div>
  <div class="tab" onclick="switchTab('chat')">💬 <span data-t="tab_chat">شات</span></div>
  <div class="tab" id="trainTab" onclick="switchTab('train')" style="display:none">🎓 <span data-t="tab_train">تدريب</span></div>
  <div class="tab" id="adminTab" onclick="switchTab('admin')" style="display:none">⚙️ <span data-t="tab_admin">إدارة</span></div>
</div>

<!-- Chat -->
<div class="chat-box" id="chatBox">
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="اكتب رسالة لجيميناي..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">ارسل</button>
  </div>
</div>

<!-- History -->
<div class="history-box" id="historyBox">
  <div style="text-align:center;color:#8b949e;font-size:13px;margin-bottom:8px" data-t="history_title">آخر 20 تصنيف</div>
  <div id="historyList"></div>
</div>

<!-- Training (Admin only) -->
<div class="train-box" id="trainBox">
  <div class="train-count" id="trainCount">صور التدريب: 0</div>
  <div class="train-btns">
    <button class="btn btn-sec" onclick="uploadTraining()">📤 ارفع صورة تدريب</button>
    <button class="btn btn-sec" onclick="clearTraining()" style="background:#da3633;color:#fff">🗑 مسح الكل</button>
  </div>
  <input type="file" id="trainFile" accept="image/*" style="display:none" onchange="handleTrainFile(event)">
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <!-- Stats Cards -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#8b949e">المستخدمين</div>
      <div style="font-size:20px;font-weight:bold;color:#58a6ff" id="statUsers">0</div>
    </div>
    <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#8b949e">صور النهاردة</div>
      <div style="font-size:20px;font-weight:bold;color:#2ea043" id="statToday">0</div>
    </div>
    <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:11px;color:#8b949e">إجمالي كل الصور</div>
      <div style="font-size:20px;font-weight:bold;color:#d29922" id="statTotal">0</div>
    </div>
  </div>
  <!-- Daily Chart -->
  <div style="background:#0d1117;border-radius:8px;padding:10px;margin-bottom:12px">
    <div style="font-size:12px;color:#8b949e;margin-bottom:8px">آخر 7 أيام</div>
    <div id="dailyChart" style="display:flex;align-items:flex-end;gap:4px;height:80px"></div>
  </div>
  <h3 data-t="admin_users_title">بيانات المستخدمين</h3>
  <div id="adminUsersList"></div>
  <hr style="border-color:#21262d;margin:12px 0">
  <h3 data-t="admin_failed_title">صور فاشلة (شكاوى)</h3>
  <div id="adminFailedList"></div>
</div>

</div>

<canvas id="canvas" style="display:none"></canvas>

// Camera (v25 exact settings)
// ══════════════════════════════════════════
async function findBestCamera() {
  if (bestCameraId) return bestCameraId;
  try {
    var temp = await navigator.mediaDevices.getUserMedia({video:true});
    temp.getTracks().forEach(function(t){t.stop();});
    var devices = await navigator.mediaDevices.enumerateDevices();
    var cams = devices.filter(function(d){return d.kind==='videoinput';});
    if (cams.length <= 1) return null;
    var best = null, bestRes = 0;
    for (var i=0; i<cams.length; i++) {
      try {
        var ts = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cams[i].deviceId}}});
        var track = ts.getVideoTracks()[0];
        var caps = track.getCapabilities ? track.getCapabilities() : {};
        var maxW = (caps.width && caps.width.max) ? caps.width.max : 0;
        if (maxW > bestRes) { bestRes = maxW; best = cams[i].deviceId; }
        ts.getTracks().forEach(function(t){t.stop();});
      } catch(e) {}
    }
    if (best) { bestCameraId = best; }
    return best;
  } catch(e) { return null; }
}

async function startCamera() {
  if (stream) { try { stream.getTracks().forEach(function(t){t.stop();}); } catch(x){} stream = null; }
  imageCapture = null;
  var camId = await findBestCamera();
  // Attempt 1: exact deviceId + 4K
  if (camId) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{deviceId:{exact:camId},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'}, audio:false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 2: facingMode environment + 4K
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:3840},height:{ideal:2160},focusMode:'continuous'}, audio:false
      });
    } catch(e) { stream = null; }
  }
  // Attempt 3: facingMode environment + 1080p
  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}, audio:false
      });
    } catch(e) { stream = null; }
  }
  if (!stream) { document.getElementById('autoMsg').textContent = 'مفيش كاميرا'; return false; }
  var video = document.getElementById('video');
  video.srcObject = stream;
  video.muted = true;
  await new Promise(function(r){ video.onloadedmetadata = function(){ video.play().then(r).catch(r); }; setTimeout(r,3000); });
  // ImageCapture
  try {
    if ('ImageCapture' in window) {
      var track = stream.getVideoTracks()[0];
      var ic = new ImageCapture(track);
      await ic.grabFrame();
      imageCapture = ic;
    }
  } catch(e) { imageCapture = null; }
  cameraActive = true;
  startQualityMonitor();
  document.getElementById('autoMsg').textContent = 'وجّه الكاميرا على شريحة الذاكرة';
  return true;
}

async function toggleFlash() {
  if (!stream) return;
  flashActive = !flashActive;
  try {
    var track = stream.getVideoTracks()[0];
    await track.applyConstraints({advanced:[{torch:flashActive}]});

// ══════════════════════════════════════════
// Quality Monitoring (v25 exact)
// ══════════════════════════════════════════
function startQualityMonitor() {
  if (autoInterval) clearInterval(autoInterval);
  autoProgress = 0; prevFrame = null;
  autoInterval = setInterval(analyzeFrame, 800);
}
function stopQualityMonitor() {
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  autoProgress = 0; prevFrame = null;
}

function analyzeFrame() {
  if (!stream || isAnalyzing) return;
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas || video.videoWidth === 0) return;
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  var cx = Math.floor(canvas.width*0.25), cy = Math.floor(canvas.height*0.25);
  var cw = Math.floor(canvas.width*0.5), ch = Math.floor(canvas.height*0.5);
  var imgData = ctx.getImageData(cx, cy, cw, ch);
  var data = imgData.data;
  // Sharpness (Laplacian)
  var sharp = 0;
  for (var y=1; y<ch-1; y+=4) {
    for (var x=1; x<cw-1; x+=4) {
      var idx=(y*cw+x)*4;
      var center=data[idx], top=data[((y-1)*cw+x)*4]||0, bottom=data[((y+1)*cw+x)*4]||0;
      var left=data[(y*cw+(x-1))*4]||0, right=data[(y*cw+(x+1))*4]||0;
      sharp += Math.abs(4*center - top - bottom - left - right);
    }
  }
  sharp = Math.min(sharp/1000, 100);
  // Stability
  var stability = 50;
  if (prevFrame && prevFrame.length === data.length) {
    var diff=0;
    for (var i=0; i<data.length; i+=16) diff += Math.abs(data[i]-prevFrame[i]);
    diff /= (data.length/16);
    stability = Math.max(0, 100 - diff*2);
  }
  prevFrame = new Uint8ClampedArray(data);
  // Brightness
  var brightness=0;
  for (var i=0; i<data.length; i+=4) brightness += (data[i]+data[i+1]+data[i+2])/3;
  brightness /= (data.length/4);
  var qS = sharp>15?'good':sharp>8?'warn':'bad';
  var qT = stability>70?'good':stability>40?'warn':'bad';
  var qL = (brightness>60&&brightness<220)?'good':brightness>30?'warn':'bad';
  document.getElementById('qSharp').className = 'q-dot '+qS;
  document.getElementById('qStable').className = 'q-dot '+qT;
  document.getElementById('qLight').className = 'q-dot '+qL;
  var allGood = qS==='good' && qT==='good' && qL==='good';
  if (allGood) autoProgress = Math.min(100, autoProgress+3);
  else autoProgress = Math.max(0, autoProgress-5);
  document.getElementById('progressFill').style.width = autoProgress+'%';
  if (qL==='bad') document.getElementById('autoMsg').textContent = 'الإضاءة ضعيفة';
  else if (qS==='bad') document.getElementById('autoMsg').textContent = 'قرّب أكتر';
  else if (qT==='bad') document.getElementById('autoMsg').textContent = 'ثبّت إيدك';
  else if (allGood && autoProgress<100) document.getElementById('autoMsg').textContent = 'ممتاز! ثبّت... '+autoProgress+'%';
  else if (allGood) document.getElementById('autoMsg').textContent = 'جاهز! اضغط صوّر';
}

// ══════════════════════════════════════════
// Capture + OCR-first pipeline
// ══════════════════════════════════════════
function cropToFocusBox(srcCanvas, vw, vh) {
  var bw = vw * 0.3, bh = bw / 1.2;
  var bx = (vw - bw) / 2, by = (vh - bh) / 2;
  var c = document.createElement('canvas');
  c.width = bw; c.height = bh;
  c.getContext('2d').drawImage(srcCanvas, bx, by, bw, bh, 0, 0, bw, bh);
  return c;
}

function tapCapture() {
  if (!stream || !cameraActive || isAnalyzing) return;
  stopQualityMonitor();
  captureAndAnalyze();
}

async function captureAndAnalyze() {
  isAnalyzing = true;
  document.getElementById('captureBtn').textContent = t('status_analyzing');
  document.getElementById('statusText').textContent = t('status_photo');
  document.getElementById('reportBtn').style.display = 'none';
  document.getElementById('reportMsg').textContent = '';
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas) return;
  var ctx = canvas.getContext('2d');
  var w = video.videoWidth || 1280, h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  var base64 = null;

  // Freeze from video first (matches what user sees exactly)
  ctx.drawImage(video, 0, 0, w, h);
  freezeFrame(canvas.toDataURL('image/jpeg',0.9));

  // Try ImageCapture for higher quality (skip if flash on — avoids flicker)
  if (imageCapture && !flashActive) {
    try {
      var blob = await imageCapture.takePhoto();
      var img = await createImageBitmap(blob);
      canvas.width = img.width; canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      var cropped = cropToFocusBox(canvas, img.width, img.height);
      base64 = cropped.toDataURL('image/jpeg',1.0).split(',')[1];
    } catch(e) { base64 = null; }
  }
  // Fallback: canvas from video
  if (!base64) {
    canvas.width = w; canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);
    var cropped = cropToFocusBox(canvas, w, h);
    base64 = cropped.toDataURL('image/jpeg',1.0).split(',')[1];
  }

  // Save for potential report
  lastCapturedBase64 = base64;

  // Track usage
  if (currentUser) {
    try {
      var useRes = await fetch('/api/user/use-image', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone: currentUser.phone }) });
      var useData = await useRes.json();
      if (useData.totalUsed) currentUser.totalUsed = useData.totalUsed;
      updateImgCounter();
      if (useData.rateLimited) {
        document.getElementById('statusText').textContent = currentLang === 'ar' ? 'وصلت الحد اليومي — جرب بكره' : 'Daily limit reached — try tomorrow';
        isAnalyzing = false; document.getElementById('captureBtn').textContent = t('capture_btn'); unfreezeFrame(); return;
      }
    } catch(e) {}
  }

  // ═══ Step 1: Fast OCR (Gemini as OCR reader — 1-2 seconds) ═══
  document.getElementById('statusText').textContent = t('status_ocr');
  var ocrResult = null;

  try {
    var visionRes = await fetch('/api/vision-ocr', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: base64 })
    });

    if (visionRes.ok) {
      var visionData = await visionRes.json();
      var ocrText = (visionData.text || '').trim();
      console.log('🔤 OCR قرأ:', ocrText);

      if (ocrText && ocrText.length >= 3) {
        // Server lookup (DB is on server only for protection)
        document.getElementById('statusText').textContent = t('status_lookup');
        var lookupRes = await fetch('/api/lookup', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ code: ocrText, source: 'vision' })
        });
        if (lookupRes.ok) {
          var lookupData = await lookupRes.json();
          if (lookupData.found && lookupData.storage && lookupData.type) {
            ocrResult = {
              code: lookupData.code || ocrText, storage: lookupData.storage,
              type: lookupData.type, company: lookupData.company || '',
              ram: lookupData.ram || null, step: 'OCR+DB', confidence: lookupData.confidence || 93
            };
            if (lookupData.suggestion) ocrResult.suggestion = lookupData.suggestion;
            console.log('✅ OCR → Server lookup:', ocrResult);
          }
        }
      }
    }
  } catch(ocrErr) {
    console.log('OCR error (will fallback to Gemini):', ocrErr.message);
  }

  // If OCR succeeded, show result immediately
  if (ocrResult && ocrResult.storage && ocrResult.type) {
    showResult(ocrResult);
    isAnalyzing = false;
    document.getElementById('captureBtn').textContent = t('capture_btn');
    return;
  }

  // ═══ Step 2: Gemini full analysis (fallback — 3-8 seconds) ═══
  console.log('🧠 OCR فشل → Gemini بيبدأ...');
  document.getElementById('statusText').textContent = t('status_gemini');
  try {
    var resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: base64, sessionId: sessionId })
    });
    var data = await resp.json();
    if (data.error) {
      document.getElementById('statusText').textContent = data.error;
      document.getElementById('resultCard').className = 'result-card';
      showReportButton();
      unfreezeFrame();
    } else if (!data.code || data.code === 'NOT_FOUND') {
      document.getElementById('statusText').textContent = t('status_no_read');
      document.getElementById('resultCard').className = 'result-card';
      showReportButton();
      unfreezeFrame();
    } else {
      data.step = data.step || 'Gemini';
      showResult(data);
      // Stay frozen — user must press ✅ or ✏️
    }
  } catch(err) {
    document.getElementById('statusText').textContent = t('status_conn_err');
    showReportButton();
    unfreezeFrame();
  }

  isAnalyzing = false;
  document.getElementById('captureBtn').textContent = '📸 صوّر';
}

function handleTrainFile(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result;
    var label = prompt('وصف الصورة (مثلاً: تفكيك عادي سامسونج)') || '';
    fetch('/api/training/add', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: b64, label: label })
    }).then(function(r){return r.json();}).then(function(d){
      if (d.success) {
        document.getElementById('trainCount').textContent = 'صور التدريب: ' + d.count;
        alert('تم إضافة صورة التدريب ✅');
      }
    }).catch(function(){ alert('خطأ'); });
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearTraining() {
  if (!confirm('متأكد تمسح كل صور التدريب؟')) return;
  fetch('/api/training/clear', {method:'POST'}).then(function(r){return r.json();}).then(function(){
    document.getElementById('trainCount').textContent = 'صور التدريب: 0';
  }).catch(function(){});
}

// ══════════════════════════════════════════
// Confirm / Correct Result
// ══════════════════════════════════════════
function confirmResult() {
  if (!lastResult || !lastResult.code) return;
  fetch('/api/confirm', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(lastResult)
  }).then(function(r){return r.json();}).then(function(){
    document.getElementById('statusText').textContent = 'تم الحفظ ✅';
  }).catch(function(){});
  unfreezeFrame();
  document.getElementById('resultCard').className = 'result-card';
}

function showCorrectForm() {
  var form = document.getElementById('correctForm');
  form.className = 'correct-form show';
  if (lastResult) {
    document.getElementById('corrCode').value = lastResult.code || '';
    document.getElementById('corrStorage').value = lastResult.storage || '';
    document.getElementById('corrType').value = lastResult.type || 'عادي';
    document.getElementById('corrCompany').value = lastResult.company || '';
    document.getElementById('corrRam').value = lastResult.ram || '';
  }
}

function submitCorrection() {
  var corrected = {
    code: document.getElementById('corrCode').value.trim(),
    correctStorage: document.getElementById('corrStorage').value.trim(),
    correctType: document.getElementById('corrType').value,
    company: document.getElementById('corrCompany').value.trim(),
    correctRam: document.getElementById('corrRam').value.trim()
  };
  fetch('/api/correct', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(corrected)
  }).then(function(r){return r.json();}).then(function(){
    document.getElementById('statusText').textContent = 'تم حفظ التصحيح ✅';
  }).catch(function(){});
  unfreezeFrame();
  document.getElementById('resultCard').className = 'result-card';
}

// ══════════════════════════════════════════
// History
// ══════════════════════════════════════════
async function loadHistory() {
  if (!currentUser) return;
  try {
    var resp = await fetch('/api/user/history?phone=' + encodeURIComponent(currentUser.phone));
    var data = await resp.json();
    var list = document.getElementById('historyList');
    if (!data.history || data.history.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:#484f58;padding:20px">' + t('history_empty') + '</div>';
      return;
    }
    var html = '';
    data.history.forEach(function(h) {
      var dt = h.date ? new Date(h.date).toLocaleDateString('ar-EG', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      html += '<div class="hist-item"><div><span class="hist-code">' + (h.code||'?') + '</span> <span class="hist-info">' + (h.storage||'') + 'GB ' + (h.type||'') + '</span></div><div class="hist-date">' + dt + '</div></div>';
    });
    list.innerHTML = html;
  } catch(e) { console.log('History load error'); }
}

// ══════════════════════════════════════════
// Admin Functions
// ══════════════════════════════════════════
async function loadAdminData() {
  if (!currentUser || currentUser.role !== 'admin') return;
  // Load users + stats
  try {
    var resp = await fetch('/api/admin/users?phone=' + encodeURIComponent(currentUser.phone));
    var data = await resp.json();
    // Update stats cards
    if (data.stats) {
      document.getElementById('statUsers').textContent = data.stats.userCount || 0;
      document.getElementById('statToday').textContent = data.stats.totalToday || 0;
      document.getElementById('statTotal').textContent = data.stats.totalAll || 0;
    }
    // Users table
    var html = '<table class="admin-table"><tr><th>الرقم</th><th>الاسم</th><th>الوظيفة</th><th>استخدم</th><th>اليوم</th></tr>';
    (data.users || []).forEach(function(u) {
      html += '<tr><td>' + u.phone + '</td><td>' + (u.name||'-') + '</td><td>' + (u.jobType||'-') + '</td><td>' + (u.totalUsed||0) + '</td><td>' + (u.todayUsed||0) + '</td></tr>';
    });
    html += '</table>';
    html += '<div class="admin-credits"><input id="creditPhone" placeholder="رقم المستخدم"><input id="creditAmount" placeholder="عدد" type="number" style="max-width:60px"><button onclick="addCredits()">شحن</button></div>';
    document.getElementById('adminUsersList').innerHTML = html;
  } catch(e) {}
  // Load daily chart
  try {
    var resp3 = await fetch('/api/admin/daily-stats?phone=' + encodeURIComponent(currentUser.phone));
    var data3 = await resp3.json();
    if (data3.dailyTotals) {
      var max = Math.max(1, Math.max.apply(null, data3.dailyTotals.map(function(d){return d.count;})));
      var chartHtml = '';
      data3.dailyTotals.forEach(function(d) {
        var h = Math.max(4, Math.round((d.count / max) * 70));
        var dayLabel = d.date.slice(5); // MM-DD
        chartHtml += '<div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">';
        chartHtml += '<div style="font-size:10px;color:#58a6ff;margin-bottom:2px">' + (d.count||'') + '</div>';
        chartHtml += '<div style="width:100%;max-width:30px;height:' + h + 'px;background:#238636;border-radius:4px 4px 0 0"></div>';
        chartHtml += '<div style="font-size:9px;color:#484f58;margin-top:3px">' + dayLabel + '</div>';
        chartHtml += '</div>';
      });
      document.getElementById('dailyChart').innerHTML = chartHtml;
    }
  } catch(e) {}
  // Load failed images
  try {
    var resp2 = await fetch('/api/admin/failed-images?phone=' + encodeURIComponent(currentUser.phone));
    var data2 = await resp2.json();
    if (!data2.images || data2.images.length === 0) {
      document.getElementById('adminFailedList').innerHTML = '<div style="color:#484f58;text-align:center">مفيش شكاوى</div>';
      return;
    }
    var html2 = '';
    data2.images.forEach(function(img) {
      var imgUrl = '/api/admin/failed-image/' + img.imageFile + '?phone=' + encodeURIComponent(currentUser.phone);
      html2 += '<div style="border-bottom:1px solid #21262d;padding:8px;display:flex;gap:8px;align-items:center">';
      html2 += '<img src="' + imgUrl + '" style="width:50px;height:50px;object-fit:cover;border-radius:6px;border:1px solid #30363d" onclick="window.open(this.src)">';
      html2 += '<div style="flex:1"><div class="hist-code">' + (img.phone||'?') + '</div>';
      html2 += '<div class="hist-date">' + (img.date ? new Date(img.date).toLocaleDateString('ar-EG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '') + '</div>';
      if (img.ocrText) html2 += '<div style="font-size:10px;color:#d29922">OCR: ' + img.ocrText + '</div>';
      html2 += '</div></div>';
    });
    document.getElementById('adminFailedList').innerHTML = html2;
  } catch(e) {}
}

async function addCredits() {
  var phone = document.getElementById('creditPhone').value.trim();
  var amount = document.getElementById('creditAmount').value.trim();
  if (!phone || !amount) return;
  try {
    await fetch('/api/admin/add-credits', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ adminPhone: currentUser.phone, userPhone: phone, credits: parseInt(amount) })
    });
    loadAdminData();
  } catch(e) {}
}

window.addEventListener('load', function() {
  // Check saved language
  try { var savedLang = localStorage.getItem('memchip_lang'); if (savedLang) currentLang = savedLang; } catch(e) {}
  // Check saved login
  try {
    var saved = localStorage.getItem('memchip_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      onLoginSuccess();
    }
  } catch(e) {}
  startCamera();
  if (currentUser && currentUser.role === 'admin') loadTrainingCount();
});
